components:
    securitySchemes:
        StaffBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: |
                Staff-only bearer token. MUST be issued from a separate staff identity provider or with
                strict audience/claims and mandatory audit logging.

    parameters:
        AdminJustification:
            name: X-Admin-Justification
            in: header
            required: true
            description: Human-readable justification for privileged actions (audited).
            schema:
                type: string
                minLength: 10
                maxLength: 500

        AuditEventId:
            name: auditEventId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/AuditEventId"

        EnforcementActionId:
            name: actionId
            in: path
            required: true
            schema:
                type: string
                example: enf_01J8W0K7E2ZQZ6P0M4NQW2Y7IA

    schemas:
        AdminMeta:
            type: object
            additionalProperties: false
            required: [serverTime, capabilities]
            properties:
                serverTime:
                    type: string
                    format: date-time
                capabilities:
                    type: array
                    items:
                        type: string
                    examples:
                        - [
                              "trustSafety.enforcement.write",
                              "verified.events.write",
                              "promotions.write",
                              "media.moderation.write",
                          ]

        StaffProfile:
            type: object
            additionalProperties: false
            required: [staffId, displayName]
            properties:
                staffId:
                    type: string
                    example: stf_01J8W0K7E2ZQZ6P0M4NQW2Y7ZZ
                displayName:
                    type: string
                email:
                    type: string
                    format: email
                role:
                    type: string
                    description: Single-role model supported; still explicit for audit.
                    example: staff

        AuditEventId:
            type: string
            example: aud_01J8W0K7E2ZQZ6P0M4NQW2Y7KA

        AuditActionType:
            type: string
            description: Stable action id for audit.
            enum:
                - user.update
                - enforcement.create
                - enforcement.update
                - report.update
                - appeal.update
                - media.approve
                - media.reject
                - chat.deleteMessage
                - tournament.update
                - tournament.recompute
                - verifiedEvent.create
                - verifiedEvent.update
                - verifiedEvent.publish
                - verifiedEvent.unpublish
                - promotion.create
                - promotion.update
                - rankedTrack.create
                - rankedTrack.update
                - achievement.update
                - sports.match.override

        AuditEvent:
            type: object
            additionalProperties: false
            required: [auditEventId, actionType, actorStaffId, occurredAt]
            properties:
                auditEventId:
                    $ref: "#/components/schemas/AuditEventId"
                actionType:
                    $ref: "#/components/schemas/AuditActionType"
                actorStaffId:
                    type: string
                justification:
                    type: string
                occurredAt:
                    type: string
                    format: date-time
                target:
                    type: object
                    additionalProperties: true
                    description: Target identifiers (userId/tournamentId/mediaId/etc).
                request:
                    type: object
                    additionalProperties: true
                    description: Redacted request summary (no secrets).
                outcome:
                    type: object
                    additionalProperties: true
                    description: Result summary (status codes, ids created).

        AuditEventPage:
            type: object
            additionalProperties: false
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/AuditEvent"
                nextCursor:
                    type: string

        AdminUserStatus:
            type: string
            enum: [active, restricted, suspended, banned]

        AdminUserInclude:
            type: string
            enum: [email, enforcement, devices]
            description: Optional expansions.

        AdminUser:
            type: object
            additionalProperties: false
            required: [userId, username, status, createdAt]
            properties:
                userId:
                    type: string
                username:
                    type: string
                email:
                    type: string
                    format: email
                status:
                    $ref: "#/components/schemas/AdminUserStatus"
                createdAt:
                    type: string
                    format: date-time
                lastActiveAt:
                    type: string
                    format: date-time
                country:
                    type: string
                    example: ES
                flags:
                    type: object
                    additionalProperties:
                        type: boolean
                    examples:
                        - { suspectedSpam: false, creatorAccount: true }
                enforcement:
                    type: array
                    items:
                        $ref: "#/components/schemas/EnforcementAction"

        AdminUserPage:
            type: object
            additionalProperties: false
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/AdminUser"
                nextCursor:
                    type: string

        AdminUpdateUserRequest:
            type: object
            additionalProperties: false
            properties:
                status:
                    $ref: "#/components/schemas/AdminUserStatus"
                flags:
                    type: object
                    additionalProperties:
                        type: boolean

        AdminCreateEnforcementActionRequest:
            type: object
            additionalProperties: false
            required: [type, reasonCode]
            properties:
                type:
                    $ref: "#/components/schemas/EnforcementActionType"
                scope:
                    $ref: "#/components/schemas/EnforcementScope"
                reasonCode:
                    type: string
                reasonText:
                    type: string
                startsAt:
                    type: string
                    format: date-time
                endsAt:
                    type: string
                    format: date-time
                appealable:
                    type: boolean
                    default: true
                policyId:
                    $ref: "#/components/schemas/TrustPolicyId"

        AdminUpdateEnforcementActionRequest:
            type: object
            additionalProperties: false
            properties:
                endsAt:
                    type: string
                    format: date-time
                reasonText:
                    type: string
                appealable:
                    type: boolean

        AdminUpdateReportRequest:
            type: object
            additionalProperties: false
            required: [status]
            properties:
                status:
                    $ref: "#/components/schemas/ReportStatus"
                resolutionNote:
                    type: string
                    maxLength: 2000

        AdminUpdateAppealRequest:
            type: object
            additionalProperties: false
            required: [status]
            properties:
                status:
                    $ref: "#/components/schemas/AppealStatus"
                responseMessage:
                    type: string
                    maxLength: 2000

        AdminMediaModerationPage:
            type: object
            additionalProperties: false
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        type: object
                        additionalProperties: false
                        required: [media]
                        properties:
                            media:
                                $ref: "#/components/schemas/Media"
                            submittedByUserId:
                                type: string
                            submittedAt:
                                type: string
                                format: date-time
                nextCursor:
                    type: string

        AdminRejectMediaRequest:
            type: object
            additionalProperties: false
            required: [reasonCode]
            properties:
                reasonCode:
                    type: string
                    examples: [adult, violence, hate, spam, unsafe, other]
                message:
                    type: string
                    description: Localized user-facing message.

        AdminChatModerationStatus:
            type: string
            enum: [flagged, reviewed, actioned]

        AdminChatModerationPage:
            type: object
            additionalProperties: false
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        type: object
                        additionalProperties: false
                        required:
                            [
                                messageId,
                                tournamentId,
                                userId,
                                content,
                                createdAt,
                            ]
                        properties:
                            messageId:
                                $ref: "#/components/schemas/ChatMessageId"
                            tournamentId:
                                $ref: "#/components/schemas/TournamentId"
                            userId:
                                type: string
                            content:
                                type: string
                            createdAt:
                                type: string
                                format: date-time
                            signals:
                                type: object
                                additionalProperties: true
                nextCursor:
                    type: string

        AdminTournamentStatus:
            type: string
            enum: [active, ended, deleted]

        AdminTournamentInclude:
            type: string
            enum: [invitationCode, joinRules, verification]
            description: Optional expansions.

        AdminTournament:
            allOf:
                - $ref: "#/components/schemas/Tournament"
                - type: object
                  additionalProperties: false
                  properties:
                      status:
                          $ref: "#/components/schemas/AdminTournamentStatus"
                      invitationCode:
                          type: string
                      verification:
                          type: object
                          additionalProperties: false
                          properties:
                              verified:
                                  type: boolean
                              verifiedEventId:
                                  $ref: "#/components/schemas/VerifiedEventId"
                              creatorId:
                                  $ref: "#/components/schemas/CreatorId"

        AdminTournamentPage:
            type: object
            additionalProperties: false
            required: [items]
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/AdminTournament"
                nextCursor:
                    type: string

        AdminUpdateTournamentRequest:
            type: object
            additionalProperties: false
            properties:
                name:
                    type: string
                open:
                    type: boolean
                chatEnabled:
                    type: boolean
                status:
                    $ref: "#/components/schemas/AdminTournamentStatus"

        AdminRecomputeTournamentRequest:
            type: object
            additionalProperties: false
            properties:
                matchday:
                    type: integer
                    minimum: 1
                    description: If provided, recompute only one matchday.
                force:
                    type: boolean
                    default: false

        AdminJob:
            type: object
            additionalProperties: false
            required: [jobId, status]
            properties:
                jobId:
                    type: string
                    example: job_01J8W0K7E2ZQZ6P0M4NQW2Y7LB
                status:
                    type: string
                    enum: [queued, running, completed, failed]
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        AdminVerifiedHubConfig:
            type: object
            additionalProperties: false
            required: [sections]
            properties:
                sections:
                    type: array
                    items:
                        type: object
                        additionalProperties: false
                        required: [sectionId, type, items]
                        properties:
                            sectionId:
                                type: string
                            type:
                                $ref: "#/components/schemas/VerifiedHubSectionType"
                            title:
                                type: string
                            items:
                                type: array
                                items:
                                    type: object
                                    additionalProperties: false
                                    required: [type]
                                    properties:
                                        type:
                                            $ref: "#/components/schemas/VerifiedHubItemType"
                                        eventId:
                                            $ref: "#/components/schemas/VerifiedEventId"
                                        tournamentId:
                                            $ref: "#/components/schemas/TournamentId"

        AdminCreateVerifiedEventRequest:
            type: object
            additionalProperties: false
            required: [branding, schedule, sportId, gameModeId]
            properties:
                branding:
                    $ref: "#/components/schemas/VerifiedBranding"
                schedule:
                    $ref: "#/components/schemas/VerifiedEventSchedule"
                eligibility:
                    $ref: "#/components/schemas/VerifiedEligibility"
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                description:
                    type: string

        AdminUpdateVerifiedEventRequest:
            type: object
            additionalProperties: false
            properties:
                branding:
                    $ref: "#/components/schemas/VerifiedBranding"
                schedule:
                    $ref: "#/components/schemas/VerifiedEventSchedule"
                eligibility:
                    $ref: "#/components/schemas/VerifiedEligibility"
                description:
                    type: string
                status:
                    $ref: "#/components/schemas/VerifiedEventStatus"

        AdminCreateCreatorRequest:
            type: object
            additionalProperties: false
            required: [handle, branding]
            properties:
                handle:
                    $ref: "#/components/schemas/CreatorHandle"
                type:
                    $ref: "#/components/schemas/CreatorType"
                verified:
                    type: boolean
                    default: true
                branding:
                    $ref: "#/components/schemas/CreatorBranding"
                shortDescription:
                    type: string
                longDescription:
                    type: string
                links:
                    type: array
                    items: { $ref: "#/components/schemas/CreatorLink" }
                primaryUserId:
                    type: string

        AdminUpdateCreatorRequest:
            type: object
            additionalProperties: false
            properties:
                type:
                    $ref: "#/components/schemas/CreatorType"
                verified:
                    type: boolean
                branding:
                    $ref: "#/components/schemas/CreatorBranding"
                shortDescription:
                    type: string
                longDescription:
                    type: string
                links:
                    type: array
                    items: { $ref: "#/components/schemas/CreatorLink" }
                primaryUserId:
                    type: string

        AdminCreatePromotionRequest:
            type: object
            additionalProperties: false
            required: [type, title, schedule, scope, legal]
            properties:
                type:
                    $ref: "#/components/schemas/PromotionType"
                title:
                    type: string
                subtitle:
                    type: string
                heroImageUrl:
                    type: string
                    format: uri
                schedule:
                    $ref: "#/components/schemas/PromotionSchedule"
                scope:
                    $ref: "#/components/schemas/PromotionScope"
                mechanics:
                    type: array
                    items: { $ref: "#/components/schemas/PromotionMechanic" }
                rewards:
                    type: array
                    items:
                        {
                            $ref: "#/components/schemas/PromotionRewardDefinition",
                        }
                eligibility:
                    $ref: "#/components/schemas/PromotionEligibility"
                legal:
                    $ref: "#/components/schemas/PromotionLegal"
                featured:
                    type: boolean
                    default: false

        AdminUpdatePromotionRequest:
            type: object
            additionalProperties: false
            properties:
                title:
                    type: string
                subtitle:
                    type: string
                heroImageUrl:
                    type: string
                    format: uri
                schedule:
                    $ref: "#/components/schemas/PromotionSchedule"
                mechanics:
                    type: array
                    items: { $ref: "#/components/schemas/PromotionMechanic" }
                rewards:
                    type: array
                    items:
                        {
                            $ref: "#/components/schemas/PromotionRewardDefinition",
                        }
                eligibility:
                    $ref: "#/components/schemas/PromotionEligibility"
                legal:
                    $ref: "#/components/schemas/PromotionLegal"
                featured:
                    type: boolean
                status:
                    $ref: "#/components/schemas/PromotionStatus"

        AdminCreateRankedTrackRequest:
            type: object
            additionalProperties: false
            required: [rankedTrackId, name, ratingModel, scope, eligibility]
            properties:
                rankedTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                name:
                    type: string
                description:
                    type: string
                ratingModel:
                    $ref: "#/components/schemas/RankedRatingModel"
                cadence:
                    $ref: "#/components/schemas/RankedSeasonCadence"
                scope:
                    $ref: "#/components/schemas/RankedTrackScope"
                eligibility:
                    $ref: "#/components/schemas/RankedEligibilityPolicy"
                tiers:
                    type: array
                    items: { $ref: "#/components/schemas/RankedTierDefinition" }
                featured:
                    type: boolean

        AdminUpdateRankedTrackRequest:
            type: object
            additionalProperties: false
            properties:
                name:
                    type: string
                description:
                    type: string
                status:
                    $ref: "#/components/schemas/RankedTrackStatus"
                eligibility:
                    $ref: "#/components/schemas/RankedEligibilityPolicy"
                tiers:
                    type: array
                    items: { $ref: "#/components/schemas/RankedTierDefinition" }
                featured:
                    type: boolean

        AdminUpdateAchievementRequest:
            type: object
            additionalProperties: false
            properties:
                name:
                    type: string
                description:
                    type: string
                category:
                    $ref: "#/components/schemas/AchievementCategory"
                rarity:
                    $ref: "#/components/schemas/AchievementRarity"
                featured:
                    type: boolean
                hidden:
                    type: boolean
                eligibility:
                    $ref: "#/components/schemas/AchievementEligibility"
                requirements:
                    type: array
                    items:
                        { $ref: "#/components/schemas/AchievementRequirement" }
                rewards:
                    type: array
