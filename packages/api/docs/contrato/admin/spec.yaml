tags:
    - name: admin
      summary: Admin / Backoffice
      description: Staff-only backoffice APIs (highly privileged).
      kind: nav
      x-rankup-internal: true

    - name: admin.meta
      summary: Meta
      description: Admin meta and staff identity.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.audit
      summary: Audit
      description: Immutable audit log for privileged actions.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.users
      summary: Users
      description: User lookup, flags, and enforcement actions.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.trustSafety
      summary: Trust & Safety
      description: Reports, appeals, and moderation queues.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.media
      summary: Media moderation
      description: Media review/approval and takedowns.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.tournaments
      summary: Tournaments
      description: Tournament inspection, lifecycle overrides, recomputation.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.verified
      summary: Verified hub
      description: Manage verified events/tournaments and hub curation.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.creators
      summary: Creators
      description: Manage creator profiles, collections, and featuring.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.promotions
      summary: Promotions & rewards
      description: Manage official promotions, winners, and reward grants (no betting).
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.ranked
      summary: Ranked
      description: Manage ranked tracks/seasons and recomputation.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.achievements
      summary: Achievements
      description: Manage achievement definitions and grants.
      parent: admin
      kind: nav
      x-rankup-internal: true

    - name: admin.sports
      summary: Sports operations
      description: Overrides and recomputation for sports data (staff-only).
      parent: admin
      kind: nav
      x-rankup-internal: true

paths:
    /admin/meta:
        get:
            tags: [admin.meta]
            operationId: getAdminMeta
            summary: Get admin meta
            description: Admin-only meta and capabilities.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
            responses:
                "200":
                    description: Admin meta.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminMeta"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "429": { $ref: "#/components/responses/TooManyRequests" }

    /admin/me:
        get:
            tags: [admin.meta]
            operationId: getAdminMe
            summary: Get staff identity
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
            responses:
                "200":
                    description: Staff profile.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/StaffProfile"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/audit:
        get:
            tags: [admin.audit]
            operationId: listAuditEvents
            summary: List audit events
            description: |
                Immutable audit log. Every privileged write MUST create an audit event.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: actorStaffId
                  in: query
                  required: false
                  schema:
                      type: string
                - name: targetUserId
                  in: query
                  required: false
                  schema:
                      type: string
                - name: targetTournamentId
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/TournamentId"
                - name: actionType
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/AuditActionType"
                - name: since
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
                - name: until
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                "200":
                    description: Audit events page.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuditEventPage"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/audit/{auditEventId}:
        get:
            tags: [admin.audit]
            operationId: getAuditEvent
            summary: Get an audit event
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/AuditEventId"
            responses:
                "200":
                    description: Audit event.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuditEvent"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

    /admin/users:
        get:
            tags: [admin.users]
            operationId: adminListUsers
            summary: List users
            description: |
                Staff directory for support/moderation. Strictly rate-limited.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: q
                  in: query
                  required: false
                  description: Search by userId/username/email (server-defined).
                  schema:
                      type: string
                      minLength: 2
                      maxLength: 128
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/AdminUserStatus"
                - name: country
                  in: query
                  required: false
                  schema:
                      type: string
                      maxLength: 2
                  example: ES
                - name: include
                  in: query
                  required: false
                  style: form
                  explode: false
                  schema:
                      type: array
                      items: { $ref: "#/components/schemas/AdminUserInclude" }
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                "200":
                    description: Users page.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminUserPage"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/users/{userId}:
        get:
            tags: [admin.users]
            operationId: adminGetUser
            summary: Get user (staff view)
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/UserId"
                - name: include
                  in: query
                  required: false
                  style: form
                  explode: false
                  schema:
                      type: array
                      items: { $ref: "#/components/schemas/AdminUserInclude" }
            responses:
                "200":
                    description: User.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminUser"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

        patch:
            tags: [admin.users]
            operationId: adminUpdateUser
            summary: Update user flags (staff-only)
            description: |
                Updates staff-only flags (e.g., mark as verified creator account, force username review, etc.).
                MUST be audited and require a justification header.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/UserId"
                - $ref: "#/components/parameters/AdminJustification"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminUpdateUserRequest"
            responses:
                "200":
                    description: Updated user.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminUser"
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "422": { $ref: "#/components/responses/UnprocessableEntity" }

    /admin/users/{userId}/enforcement-actions:
        get:
            tags: [admin.trustSafety]
            operationId: adminListUserEnforcementActions
            summary: List enforcement actions for a user
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/UserId"
                - name: activeOnly
                  in: query
                  required: false
                  schema:
                      type: boolean
                      default: false
            responses:
                "200":
                    description: Enforcement actions.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties: false
                                required: [items]
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/EnforcementAction"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

        post:
            tags: [admin.trustSafety]
            operationId: adminCreateEnforcementAction
            summary: Create an enforcement action
            description: |
                Creates an enforcement action (mute/suspension/restriction).
                MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/UserId"
                - $ref: "#/components/parameters/AdminJustification"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminCreateEnforcementActionRequest"
            responses:
                "201":
                    description: Enforcement action created.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Location:
                            description: Canonical URL of the created enforcement action.
                            schema: { type: string, format: uri-reference }
                            example: /admin/enforcement-actions/enf_01J8W0K7E2ZQZ6P0M4NQW2Y7IA
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnforcementAction"
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "409": { $ref: "#/components/responses/Conflict" }
                "422": { $ref: "#/components/responses/UnprocessableEntity" }

    /admin/enforcement-actions/{actionId}:
        get:
            tags: [admin.trustSafety]
            operationId: adminGetEnforcementAction
            summary: Get enforcement action
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/EnforcementActionId"
            responses:
                "200":
                    description: Enforcement action.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnforcementAction"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

        patch:
            tags: [admin.trustSafety]
            operationId: adminUpdateEnforcementAction
            summary: Update/resolve enforcement action
            description: |
                Updates an enforcement action (e.g., end early, change scope, mark as resolved).
                MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/EnforcementActionId"
                - $ref: "#/components/parameters/AdminJustification"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminUpdateEnforcementActionRequest"
            responses:
                "200":
                    description: Updated action.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/EnforcementAction"
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "422": { $ref: "#/components/responses/UnprocessableEntity" }

    /admin/reports:
        get:
            tags: [admin.trustSafety]
            operationId: adminListReports
            summary: List reports
            description: Moderation queue for user-submitted reports.
            security:
                - StaffBearerAuth: []
            parameters:
                - name: status
                  in: query
                  required: false
                  schema: { $ref: "#/components/schemas/ReportStatus" }
                - name: reason
                  in: query
                  required: false
                  schema: { $ref: "#/components/schemas/ReportReason" }
                - name: type
                  in: query
                  required: false
                  schema: { $ref: "#/components/schemas/ReportType" }
                - name: since
                  in: query
                  required: false
                  schema: { type: string, format: date-time }
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                "200":
                    description: Reports page.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ReportPage"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/reports/{reportId}:
        get:
            tags: [admin.trustSafety]
            operationId: adminGetReport
            summary: Get report
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/ReportId"
            responses:
                "200":
                    description: Report.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Report"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

        patch:
            tags: [admin.trustSafety]
            operationId: adminUpdateReport
            summary: Update report status
            description: |
                Updates report status (triage/resolve) and internal resolution notes.
                MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/ReportId"
                - $ref: "#/components/parameters/AdminJustification"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminUpdateReportRequest"
            responses:
                "200":
                    description: Updated report.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Report"
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "422": { $ref: "#/components/responses/UnprocessableEntity" }

    /admin/appeals:
        get:
            tags: [admin.trustSafety]
            operationId: adminListAppeals
            summary: List appeals
            security:
                - StaffBearerAuth: []
            parameters:
                - name: status
                  in: query
                  required: false
                  schema: { $ref: "#/components/schemas/AppealStatus" }
                - name: since
                  in: query
                  required: false
                  schema: { type: string, format: date-time }
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                "200":
                    description: Appeals page.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AppealPage"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/appeals/{appealId}:
        get:
            tags: [admin.trustSafety]
            operationId: adminGetAppeal
            summary: Get appeal
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/AppealId"
            responses:
                "200":
                    description: Appeal.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Appeal"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

        patch:
            tags: [admin.trustSafety]
            operationId: adminUpdateAppeal
            summary: Resolve appeal
            description: MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/AppealId"
                - $ref: "#/components/parameters/AdminJustification"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminUpdateAppealRequest"
            responses:
                "200":
                    description: Updated appeal.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Appeal"
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "422": { $ref: "#/components/responses/UnprocessableEntity" }

    /admin/moderation/media:
        get:
            tags: [admin.media]
            operationId: adminListMediaModerationQueue
            summary: List media moderation queue
            description: Media review queue (avatars, branding, etc.).
            security:
                - StaffBearerAuth: []
            parameters:
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/MediaModerationStatus"
                - name: purpose
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/MediaPurpose"
                - name: since
                  in: query
                  required: false
                  schema:
                      type: string
                      format: date-time
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                "200":
                    description: Media moderation page.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AdminMediaModerationPage"
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }

    /admin/moderation/media/{mediaId}/approve:
        post:
            tags: [admin.media]
            operationId: adminApproveMedia
            summary: Approve media asset
            description: MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/MediaId"
                - $ref: "#/components/parameters/AdminJustification"
                - $ref: "#/components/parameters/IdempotencyKey"
            responses:
                "200":
                    description: Approved media.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Media" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }
                "409": { $ref: "#/components/responses/Conflict" }

    /admin/moderation/media/{mediaId}/reject:
        post:
            tags: [admin.media]
            operationId: adminRejectMedia
            summary: Reject media asset
            description: MUST be audited and require justification.
            security:
                - StaffBearerAuth: []
            parameters:
                - $ref: "#/components/parameters/MediaId"
                - $ref: "#/components/parameters/AdminJustification"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AdminRejectMediaRequest"
            responses:
                "200":
                    description: Rejected media.
                    headers:
                        X-Request-Id:
                            { $ref: "#/components/headers/X-Request-Id" }
                        Cache-Control:
                            {
                                $ref: "#/components/headers/Cache-Control-NoStore",
                            }
                    content:
                        application/json:
                            schema: { $ref: "#/components/schemas/Media" }
                "400": { $ref: "#/components/responses/BadRequest" }
                "401": { $ref: "#/components/responses/Unauthorized" }
                "403": { $ref: "#/components/responses/Forbidden" }
                "404": { $ref: "#/components/responses/NotFound" }

    /admin/moderation/chat/messages:
        get:
            tags: [admin.trustSafety]
            operationId: adminListChatModerationQueue
            summary: List chat moderation queue
            description: Queue/search for potentially abusive messages.
            security:
                - StaffBearerAuth: []
            parameters:
