                - name: creatorId
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/CreatorId"
                - name: region
                  in: query
                  required: false
                  description: Optional region key (server-defined) for regional promos.
                  schema:
                      type: string
                      maxLength: 32
                - name: include
                  in: query
                  required: false
                  description: Optional expansions for richer promo cards.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/PromotionInclude"
                  examples:
                      minimal:
