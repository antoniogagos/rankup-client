            operationId: upsertMyMatchdaySubmission
            summary: Upsert my submission for a matchday (mode-agnostic)
            description: >
                Upserts the current user's submission for the matchday.


                Batch semantics (mobile-friendly):

                - The request contains `upserts` (set/replace items) and optional `removes` (delete items).

                - Server applies what it can; locked/invalid items are **rejected** and returned in the response.

                - If the matchday/tournament is fully locked, the server returns 409.


                Concurrency:

                - If `If-Match` is provided, server enforces it (412 on mismatch).

                - If `If-Match` is omitted, server applies last-write-wins.


                Idempotency:

                - Clients SHOULD pass `X-Idempotency-Key` for safe retries.
