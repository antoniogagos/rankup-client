    "/me/tournament-invites/{inviteId}":
        get:
            tags:
                - me.tournamentInvites
            operationId: getMyTournamentInvite
            summary: Get an invite
            description: |
                Returns a single invite targeted to the current user.

                Privacy:
                - Only the invited recipient can access this resource.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InviteId"
                - name: include
                  in: query
                  required: false
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/MyTournamentInviteInclude"
                  examples:
                      withTournamentPreview:
                          value:
                              - tournamentPreview
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Invite.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MyTournamentInvite"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
        delete:
            tags:
                - me.tournamentInvites
            operationId: hideMyTournamentInvite
            summary: Hide (archive) an invite in my inbox
            description: >
                Hides the invite from the user's inbox.


                Rationale:

                - Keeps UX clean without changing the canonical invite status (pending/accepted/declined).

                - Server SHOULD implement this as a per-recipient flag (e.g., `hiddenAt`), not a destructive delete.


                Idempotent:

                - Repeated calls keep it hidden.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InviteId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "204":
                    description: Invite hidden (or already hidden).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
    "/me/tournament-invites/{inviteId}/seen":
        put:
            tags:
                - me.tournamentInvites
            operationId: markMyTournamentInviteSeen
            summary: Mark an invite as seen
            description: |
                Marks the invite as seen/read for the current user.

                Idempotent:
                - PUT is idempotent; repeated calls keep it seen.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InviteId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "204":
                    description: Marked as seen.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
    "/me/tournament-invites/{inviteId}/accept":
        put:
            tags:
                - me.tournamentInvites
            operationId: acceptMyTournamentInvite
            summary: Accept an invite (joins tournament)
            description: >
                Accepts the invite and joins the tournament.


                Behavior:

                - If the user is already a member, server SHOULD still mark invite as accepted and return `joined=false`.

                - If the tournament is locked/full/closed, server returns 409 and invite remains pending.


                Idempotency:

                - PUT is idempotent. Clients SHOULD send `X-Idempotency-Key` to protect against mobile retries.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InviteId"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AcceptTournamentInviteRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Invite accepted; join processed.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AcceptTournamentInviteResult"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
