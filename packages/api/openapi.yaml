components:
    securitySchemes:
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: >
                JWT bearer auth. Access tokens issued by the Rankup auth system (e.g.,
                Cognito).
        StaffBearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: >
                Staff-only bearer token. MUST be issued from a separate staff identity
                provider or with

                strict audience/claims and mandatory audit logging.
    parameters:
        Accept-Language:
            name: Accept-Language
            in: header
            description: Preferred locale for human-readable text (errors/messages/labels).
            required: false
            schema:
                type: string
                examples:
                    - en
                    - es
                    - pt-PT
        If-None-Match:
            name: If-None-Match
            in: header
            description: Standard ETag cache validator.
            required: false
            schema:
                type: string
            example: '"cfg_20260131_abcdef"'
        AchievementId:
            name: achievementId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/AchievementId"
        AdminJustification:
            name: X-Admin-Justification
            in: header
            required: true
            description: Human-readable justification for privileged actions (audited).
            schema:
                type: string
                minLength: 10
                maxLength: 500
        AuditEventId:
            name: auditEventId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/AuditEventId"
        EnforcementActionId:
            name: actionId
            in: path
            required: true
            schema:
                type: string
                example: enf_01J8W0K7E2ZQZ6P0M4NQW2Y7IA
        IdempotencyKey:
            name: X-Idempotency-Key
            in: header
            required: false
            description: >
                Optional idempotency key for safe retries. When provided, the server
                MUST

                guarantee idempotent semantics for the operation for a bounded time window.
            schema:
                type: string
                minLength: 8
                maxLength: 128
        ChatMessageId:
            name: messageId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/ChatMessageId"
        CreatorId:
            name: creatorId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/CreatorId"
        CreatorCollectionId:
            name: collectionId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/CreatorCollectionId"
        GameModeId:
            name: gameModeId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/GameModeId"
        RulesetId:
            name: rulesetId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/RulesetId"
        InvitationCode:
            name: code
            in: path
            required: true
            description: High-entropy invitation code.
            schema:
                type: string
                minLength: 6
                maxLength: 32
                pattern: ^[A-Za-z0-9_-]{6,32}$
            example: AB12CD34
        NotificationId:
            name: notificationId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/NotificationId"
        FeedItemId:
            name: feedItemId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/FeedItemId"
        IfMatch:
            name: If-Match
            in: header
            required: true
            description: >
                Optimistic concurrency control. Must be the ETag value returned by the
                latest GET of the resource.
            schema:
                type: string
            example: '"me_01J8VZQ7QJ1Y6T4R3E2W1A0B9C"'
        DeviceId:
            name: deviceId
            in: path
            required: true
            schema:
                type: string
            example: dev_01J8VZQ7QJ1Y6T4R3E2W1A0B9C
        PromotionId:
            name: promotionId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/PromotionId"
        RewardGrantId:
            name: rewardGrantId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/RewardGrantId"
        RankedTrackId:
            name: rankedTrackId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/RankedTrackId"
        RankedSeasonId:
            name: rankedSeasonId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/RankedSeasonId"
        LastEventId:
            name: Last-Event-ID
            in: header
            required: false
            description: SSE resume token (previous event id).
            schema:
                type: string
            example: evt_01J8W0K7E2ZQZ6P0M4NQW2Y7AA
        FriendRequestId:
            name: friendRequestId
            in: path
            required: true
            schema:
                type: string
            example: frq_01J8VZQ7QJ1Y6T4R3E2W1A0B9C
        CompetitionId:
            name: competitionId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/CompetitionId"
        SeasonId:
            name: seasonId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/SeasonId"
        Matchday:
            name: matchday
            in: path
            required: true
            schema:
                type: integer
                minimum: 1
        MatchId:
            name: matchId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/MatchId"
        TeamId:
            name: teamId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/TeamId"
        RecapId:
            name: recapId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/RecapId"
        IfMatchOptional:
            name: If-Match
            in: header
            required: false
            description: |
                Optional optimistic concurrency control for submissions.
                If provided, must match the latest ETag from `GET .../submissions/me`.
            schema:
                type: string
            example: '"subm_01J8VZQ7QJ1Y6T4R3E2W1A0B9C"'
        InviteId:
            name: inviteId
            in: path
            required: true
            schema:
                type: string
            example: inv_01J8VZQ7QJ1Y6T4R3E2W1A0B9C
        TournamentId:
            name: tournamentId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/TournamentId"
        TrustPolicyId:
            name: policyId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/TrustPolicyId"
        ReportId:
            name: reportId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/ReportId"
        AppealId:
            name: appealId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/AppealId"
        UploadId:
            name: uploadId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/UploadId"
        MediaId:
            name: mediaId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/MediaId"
        Cursor:
            name: cursor
            in: query
            required: false
            description: Opaque cursor for pagination.
            schema:
                type: string
        PageSize:
            name: pageSize
            in: query
            required: false
            description: Page size for pagination.
            schema:
                type: integer
                minimum: 1
                maximum: 200
                default: 50
        UserId:
            name: userId
            in: path
            required: true
            schema:
                type: string
            example: usr_01HR9D9Z3N7J2K1M8QW8X0Z4Y1
        UsernamePath:
            name: username
            in: path
            required: true
            schema:
                type: string
                minLength: 3
                maxLength: 32
                pattern: ^[a-zA-Z0-9_.]{3,32}$
            example: maria
        VerifiedEventId:
            name: eventId
            in: path
            required: true
            schema:
                $ref: "#/components/schemas/VerifiedEventId"
    headers:
        X-Request-Id:
            description: Correlation identifier for tracing/debugging.
            schema:
                type: string
            example: req_01J4D3H8C9N0P1Q2R3S4T5U6V7
        ETag:
            description: Strong ETag for cache validation.
            schema:
                type: string
                pattern: ^"
            example: '"cfg_20260131_abcdef"'
        Cache-Control-Public-Short:
            description: Cache policy for public short-lived resources.
            schema:
                type: string
            example: public, max-age=60
        Cache-Control-NoStore:
            description: Cache policy for user/personalized resources.
            schema:
                type: string
            example: no-store
        Content-Language:
            description: Language of the response payload when localized strings are present.
            schema:
                type: string
            example: en
        Vary-Authorization-AcceptLanguage:
            description: Indicates the response varies based on Authorization and Accept-Language.
            schema:
                type: string
            example: Authorization, Accept-Language
        Vary-AcceptLanguage:
            description: Indicates the response varies based on Accept-Language.
            schema:
                type: string
            example: Accept-Language
        Retry-After:
            description: Seconds to wait before retrying (best-effort).
            schema:
                type: integer
                minimum: 0
            example: 5
        Cache-Control-Public-Medium:
            description: Public cache, moderate TTL (schedules/metadata that change occasionally).
            schema:
                type: string
            example: public, max-age=300
        Cache-Control-Public-Long:
            description: Public cache, long TTL (catalog data that changes rarely).
            schema:
                type: string
            example: public, max-age=3600
        Cache-Control-Private-Short:
            description: Cache policy for private, short-lived resources.
            schema:
                type: string
            example: private, max-age=60
    responses:
        DefaultProblem:
            description: Generic Problem Details response.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
        Unauthorized:
            description: Missing or invalid authentication.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        unauthorized:
                            value:
                                type: https://errors.rankup.dev/auth/unauthorized
                                title: Unauthorized
                                status: 401
                                detail: Missing or invalid access token.
                                instance: urn:problem:2c4c5d34-2b18-4d9b-9f6b-6b77f4ddc3ae
        TooManyRequests:
            description: Rate limit exceeded.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
                Retry-After:
                    $ref: "#/components/headers/Retry-After"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        rateLimited:
                            value:
                                type: https://errors.rankup.dev/rate-limit/too-many-requests
                                title: Too Many Requests
                                status: 429
                                detail: Rate limit exceeded. Try again in 5 seconds.
                                instance: urn:problem:5f5d3e1c-6c1b-4ce8-8b5c-9ce4a5f0c1c1
        InternalServerError:
            description: Unexpected server error.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        internalError:
                            value:
                                type: about:blank
                                title: Internal Server Error
                                status: 500
                                detail: Unexpected error.
                                instance: urn:problem:1c2d3e4f-7a8b-4c9d-9e0f-1a2b3c4d5e6f
        ServiceUnavailable:
            description: Service temporarily unavailable.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
                Retry-After:
                    $ref: "#/components/headers/Retry-After"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        unavailable:
                            value:
                                type: about:blank
                                title: Service Unavailable
                                status: 503
                                detail: Service temporarily unavailable.
                                instance: urn:problem:0e2f3a1b-4c5d-6e7f-8a9b-0c1d2e3f4a5b
        TournamentNotFound:
            description: Tournament not found.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        tournamentNotFound:
                            value:
                                type: https://errors.rankup.dev/tournaments/not-found
                                title: Tournament not found
                                status: 404
                                detail: Tournament does not exist or is not visible.
                                instance: urn:problem:0f1e2d3c-4b5a-6978-8c9d-0e1f2a3b4c5d
        SubmissionLocked:
            description: Submissions are locked for this matchday.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        submissionsLocked:
                            value:
                                type: https://errors.rankup.dev/submissions/locked
                                title: Submissions locked
                                status: 409
                                detail: Submissions are locked for this matchday.
                                instance: urn:problem:1f2e3d4c-5b6a-7980-9a0b-1c2d3e4f5a6b
        MatchdayClosed:
            description: Matchday is closed for gameplay submissions.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        matchdayClosed:
                            value:
                                type: https://errors.rankup.dev/matchdays/closed
                                title: Matchday closed
                                status: 409
                                detail: Matchday is closed for submissions.
                                instance: urn:problem:2a3b4c5d-6e7f-8091-0a1b-2c3d4e5f6a7b
        BadRequest:
            description: Bad Request (validation or malformed JSON).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        invalidRequest:
                            value:
                                type: https://errors.rankup.dev/validation/invalid-request
                                title: Invalid request
                                status: 400
                                detail: email must be a valid address.
                                instance: urn:problem:7a0b1c2d-3e4f-5a6b-7c8d-9e0f1a2b3c4d
        PayloadTooLarge:
            description: Payload too large.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        payloadTooLarge:
                            value:
                                type: https://errors.rankup.dev/uploads/payload-too-large
                                title: Payload Too Large
                                status: 413
                                detail: Upload exceeds the allowed size.
                                instance: urn:problem:8f1e2d3c-4b5a-6d7e-8f9a-0b1c2d3e4f5a
        UnsupportedMediaType:
            description: Unsupported media type.
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        unsupportedMediaType:
                            value:
                                type: https://errors.rankup.dev/uploads/unsupported-media-type
                                title: Unsupported Media Type
                                status: 415
                                detail: Content-Type is not supported.
                                instance: urn:problem:9a8b7c6d-5e4f-3a2b-1c0d-9e8f7a6b5c4d
        Forbidden:
            description: Forbidden (authenticated but not allowed).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        forbidden:
                            value:
                                type: https://errors.rankup.dev/auth/forbidden
                                title: Forbidden
                                status: 403
                                detail: You do not have permission to perform this action.
                                instance: urn:problem:3b4c5d6e-7f8a-9b0c-1d2e-3f4a5b6c7d8e
        Conflict:
            description: Conflict (state conflict).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        conflict:
                            value:
                                type: https://errors.rankup.dev/conflict/state
                                title: Conflict
                                status: 409
                                detail: Registration already confirmed.
                                instance: urn:problem:9f8e7d6c-5b4a-3c2d-1e0f-9a8b7c6d5e4f
        UnprocessableEntity:
            description: Unprocessable Entity (semantic validation failed; e.g.,
                invalid/expired code).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        validationFailed:
                            value:
                                type: https://errors.rankup.dev/validation/failed
                                title: Unprocessable entity
                                status: 422
                                detail: Confirmation code expired.
                                instance: urn:problem:4d5e6f7a-8b9c-0d1e-2f3a-4b5c6d7e8f9a
        PreconditionFailed:
            description: Precondition failed (ETag mismatch).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        preconditionFailed:
                            value:
                                type: https://errors.rankup.dev/precondition/failed
                                title: Precondition Failed
                                status: 412
                                detail: ETag does not match the current resource.
                                instance: urn:problem:5a6b7c8d-9e0f-1a2b-3c4d-5e6f7a8b9c0d
        NotFound:
            description: Not Found (or not visible due to privacy/blocking policy).
            headers:
                X-Request-Id:
                    $ref: "#/components/headers/X-Request-Id"
            content:
                application/problem+json:
                    schema:
                        $ref: "#/components/schemas/Problem"
                    examples:
                        notFound:
                            value:
                                type: about:blank
                                title: Not Found
                                status: 404
                                detail: User not found.
                                instance: urn:problem:6b7c8d9e-0f1a-2b3c-4d5e-6f7a8b9c0d1e
    schemas:
        HealthStatus:
            type: string
            enum:
                - ok
                - unavailable
        HealthCheck:
            type: object
            additionalProperties: false
            required:
                - status
                - serverTime
                - uptimeSeconds
                - build
            properties:
                status:
                    $ref: "#/components/schemas/HealthStatus"
                serverTime:
                    type: string
                    format: date-time
                uptimeSeconds:
                    type: integer
                    minimum: 0
                build:
                    $ref: "#/components/schemas/BuildInfo"
        ReadinessStatus:
            type: string
            enum:
                - ready
                - notReady
        CheckStatus:
            type: string
            enum:
                - ok
                - fail
                - warn
        ReadinessCheck:
            type: object
            additionalProperties: false
            required:
                - status
                - serverTime
                - checks
            properties:
                status:
                    $ref: "#/components/schemas/ReadinessStatus"
                serverTime:
                    type: string
                    format: date-time
                checks:
                    type: array
                    items:
                        $ref: "#/components/schemas/DependencyCheck"
        DependencyCheck:
            type: object
            additionalProperties: false
            required:
                - name
                - status
                - observedAt
            properties:
                name:
                    type: string
                    minLength: 1
                    examples:
                        - database
                        - cache
                        - sportsProvider
                status:
                    $ref: "#/components/schemas/CheckStatus"
                observedAt:
                    type: string
                    format: date-time
                details:
                    description: Optional non-sensitive extra info (omit by default).
                    type: object
                    additionalProperties:
                        type: string
        BuildInfo:
            type: object
            additionalProperties: false
            required:
                - service
                - environment
                - version
                - commitSha
                - builtAt
            properties:
                service:
                    type: string
                    example: rankup-api
                environment:
                    type: string
                    enum:
                        - local
                        - dev
                        - staging
                        - prod
                version:
                    type: string
                    description: Server release version (SemVer recommended).
                    example: 0.1.0
                commitSha:
                    type: string
                    description: Git commit SHA (short or full).
                    example: a1b2c3d4
                builtAt:
                    type: string
                    format: date-time
                    example: 2026-01-31T10:00:00Z
        AppConfig:
            type: object
            additionalProperties: false
            required:
                - apiVersion
                - serverTime
                - environment
                - locales
                - clientPolicy
                - maintenance
                - featureFlags
                - urls
            properties:
                apiVersion:
                    type: string
                    description: >
                        API configuration version identifier (used for debugging and client
                        cache busting).

                        This is not the OpenAPI spec version.
                    example: 2026-01-31
                serverTime:
                    type: string
                    format: date-time
                environment:
                    type: string
                    enum:
                        - local
                        - dev
                        - staging
                        - prod
                locales:
                    $ref: "#/components/schemas/LocaleConfig"
                clientPolicy:
                    $ref: "#/components/schemas/ClientPolicy"
                maintenance:
                    $ref: "#/components/schemas/MaintenanceStatus"
                featureFlags:
                    type: object
                    description: Feature flags safe to expose to clients (no secrets).
                    additionalProperties:
                        type: boolean
                urls:
                    $ref: "#/components/schemas/PublicUrls"
        LocaleConfig:
            type: object
            additionalProperties: false
            required:
                - default
                - supported
            properties:
                default:
                    type: string
                    description: Default locale if none specified.
                    example: en
                supported:
                    type: array
                    items:
                        type: string
                    example:
                        - en
                        - es
                        - pt-PT
        ClientPolicy:
            type: object
            additionalProperties: false
            required:
                - ios
                - android
                - web
            properties:
                ios:
                    $ref: "#/components/schemas/ClientVersionPolicy"
                android:
                    $ref: "#/components/schemas/ClientVersionPolicy"
                web:
                    $ref: "#/components/schemas/ClientVersionPolicy"
        ClientVersionPolicy:
            type: object
            additionalProperties: false
            required:
                - minimum
                - recommended
            properties:
                minimum:
                    type: string
                    description: Minimum supported client build/version.
                    example: 1.0.0
                recommended:
                    type: string
                    description: Recommended client build/version.
                    example: 1.2.0
                updateUrl:
                    type: string
                    format: uri
                    description: Store/app update URL (optional per platform).
                    example: https://apps.apple.com/app/id000000000
        MaintenanceMode:
            type: string
            enum:
                - none
                - readOnly
                - down
        MaintenanceStatus:
            type: object
            additionalProperties: false
            required:
                - mode
            properties:
                mode:
                    $ref: "#/components/schemas/MaintenanceMode"
                message:
                    type: string
                    description: Optional human-readable maintenance message.
                startsAt:
                    type: string
                    format: date-time
                endsAt:
                    type: string
                    format: date-time
        PublicUrls:
            type: object
            additionalProperties: false
            required:
                - statusPageUrl
                - termsOfServiceUrl
                - privacyPolicyUrl
                - supportUrl
            properties:
                statusPageUrl:
                    type: string
                    format: uri
                termsOfServiceUrl:
                    type: string
                    format: uri
                privacyPolicyUrl:
                    type: string
                    format: uri
                supportUrl:
                    type: string
                    format: uri
        BootstrapInclude:
            type: string
            enum:
                - me
                - unreadCounts
        AppBootstrap:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - config
            properties:
                serverTime:
                    type: string
                    format: date-time
                config:
                    $ref: "#/components/schemas/AppConfig"
                me:
                    $ref: "#/components/schemas/MeSummary"
                unreadCounts:
                    $ref: "#/components/schemas/UnreadCounts"
        MeSummary:
            type: object
            additionalProperties: false
            required:
                - userId
                - username
            properties:
                userId:
                    type: string
                    description: Stable user identifier.
                    example: usr_01HR9D9Z3N7J2K1M8QW8X0Z4Y1
                username:
                    type: string
                    example: maria
                pictureUrl:
                    type: string
                    format: uri
                    description: Optional avatar URL.
        UnreadCounts:
            type: object
            additionalProperties: false
            required:
                - notifications
                - tournamentInvites
                - chats
            properties:
                notifications:
                    type: integer
                    minimum: 0
                tournamentInvites:
                    type: integer
                    minimum: 0
                chats:
                    type: integer
                    minimum: 0
        Problem:
            type: object
            description: |
                Problem Details as per RFC 9457 (compatible with RFC 7807).
                Use `application/problem+json`.
            required:
                - type
                - title
            additionalProperties: true
            properties:
                type:
                    type: string
                    format: uri-reference
                    description: A URI reference that identifies the problem type.
                    default: about:blank
                title:
                    type: string
                    description: Short, human-readable summary of the problem type.
                status:
                    type: integer
                    format: int32
                    minimum: 100
                    maximum: 599
                    description: HTTP status code.
                detail:
                    type: string
                    description: Human-readable explanation specific to this occurrence.
                instance:
                    type: string
                    format: uri-reference
                    description: A URI reference that identifies the specific occurrence.
                code:
                    type: string
                    description: Application-specific stable error code.
                    example: AUTH_INVALID_TOKEN
                requestId:
                    type: string
                    description: Correlation id (same as X-Request-Id when available).
                errors:
                    type: array
                    description: Optional list of field-level errors (validation).
                    items:
                        $ref: "#/components/schemas/FieldError"
        FieldError:
            type: object
            additionalProperties: false
            required:
                - path
                - message
            properties:
                path:
                    type: string
                    description: JSON pointer-like or dotted path to the failing field.
                    example: $.include[0]
                message:
                    type: string
                    example: invalid value
        AchievementId:
            type: string
            description: Stable achievement identifier.
            example: ach_scorePrediction_exact10
        AchievementCategory:
            type: string
            description: Category for discovery and UX grouping.
            enum:
                - ranked
                - verifiedEvents
                - mastery
                - social
                - streaks
                - seasonal
                - tournament
                - special
        AchievementRarity:
            type: string
            description: Display-only rarity label.
            enum:
                - common
                - rare
                - epic
                - legendary
        AchievementMetaInclude:
            type: string
            enum:
                - requirements
                - rewards
        AchievementSort:
            type: string
            enum:
                - featured
                - newest
                - nameAsc
            default: featured
        AchievementProgressStatusFilter:
            type: string
            enum:
                - any
                - inProgress
                - unlocked
                - locked
            default: any
        MyAchievementInclude:
            type: string
            enum:
                - history
        MyAchievementSort:
            type: string
            enum:
                - unlockedThenProgress
                - progressThenUnlocked
                - newestUnlocked
            default: unlockedThenProgress
        UserAchievementSort:
            type: string
            enum:
                - newestUnlocked
                - rarityDesc
                - nameAsc
            default: newestUnlocked
        AchievementRewardType:
            type: string
            description: Visual, justified rewards (no skins required).
            enum:
                - badge
                - title
                - profileFrame
                - recapCard
                - emote
        AchievementReward:
            type: object
            additionalProperties: false
            required:
                - type
                - rewardId
                - label
            properties:
                type:
                    $ref: "#/components/schemas/AchievementRewardType"
                rewardId:
                    type: string
                    example: badge_exact_scorer_bronze
                label:
                    type: string
                    description: Localized label.
                imageUrl:
                    type: string
                    format: uri
        AchievementRequirementKind:
            type: string
            description: Requirement kind for progress computation.
            enum:
                - counter
                - milestone
                - streak
                - placement
                - participation
        AchievementEligibility:
            type: object
            additionalProperties: false
            description: Defines where this achievement can be earned.
            properties:
                verifiedOnly:
                    type: boolean
                    default: true
                rankedOnly:
                    type: boolean
                    default: false
                gameModeIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/GameModeId"
                sportIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/SportId"
                formatIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentFormatId"
                verifiedEventIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/VerifiedEventId"
                rankedTrackIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedTrackId"
                notes:
                    type: string
                    description: Localized explanation.
        AchievementRequirement:
            type: object
            additionalProperties: false
            required:
                - kind
                - metricId
                - target
            properties:
                kind:
                    $ref: "#/components/schemas/AchievementRequirementKind"
                metricId:
                    type: string
                    description: Stable metric id (server-defined) used for progress.
                    examples:
                        - scorePrediction.exactScore.count
                        - scorePrediction.correctOutcome.count
                        - ranked.season.finishTopPercent
                        - verified.events.participation.count
                        - streak.dailyActive.days
                target:
                    type: number
                    description: Target value for unlock.
                window:
                    type: string
                    description:
                        Optional time window id (server-defined), e.g. "season", "event",
                        "allTime".
                    examples:
                        - allTime
                        - season
                        - event
                comparator:
                    type: string
                    enum:
                        - gte
                        - lte
                    default: gte
        AchievementDefinition:
            type: object
            additionalProperties: false
            required:
                - achievementId
                - name
                - category
                - rarity
                - eligibility
            properties:
                achievementId:
                    $ref: "#/components/schemas/AchievementId"
                name:
                    type: string
                    description: Localized name.
                description:
                    type: string
                    description: Localized description (avoid deception; explain precisely).
                category:
                    $ref: "#/components/schemas/AchievementCategory"
                rarity:
                    $ref: "#/components/schemas/AchievementRarity"
                iconUrl:
                    type: string
                    format: uri
                featured:
                    type: boolean
                hidden:
                    type: boolean
                    description:
                        If true, definition is hidden until unlocked (for surprise
                        achievements).
                eligibility:
                    $ref: "#/components/schemas/AchievementEligibility"
                requirements:
                    type: array
                    items:
                        $ref: "#/components/schemas/AchievementRequirement"
                rewards:
                    type: array
                    items:
                        $ref: "#/components/schemas/AchievementReward"
        AchievementDefinitionPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/AchievementDefinition"
                nextCursor:
                    type: string
        AchievementMeta:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - categories
            properties:
                serverTime:
                    type: string
                    format: date-time
                categories:
                    type: array
                    items:
                        $ref: "#/components/schemas/AchievementCategory"
                featured:
                    type: array
                    items:
                        $ref: "#/components/schemas/AchievementDefinition"
