    /auth/registrations:
        post:
            tags:
                - auth.registrations
            operationId: registerUser
            summary: Register a new user (email/password)
            description: >
                Creates a new user registration.


                Security note: returning 409 for already-registered emails can enable account enumeration.

                Rankup can choose between:

                - strict UX: return 409 (recommended for product clarity), or

                - privacy: always return 201/202 and email the user (anti-enumeration).
            security: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/RegisterUserRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "201":
                    description: Registration created.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Registration"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "409":
                    $ref: "#/components/responses/Conflict"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    /auth/registrations/confirm:
        post:
            tags:
                - auth.registrations
            operationId: confirmRegistration
            summary: Confirm email registration
            description: |
                Confirms a registration using the code delivered to the user's email.

                On success, returns a session (tokens) to minimize onboarding friction.
            security: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ConfirmRegistrationRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Registration confirmed; session issued.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuthSession"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    /auth/registrations/resend-confirmation:
        post:
            tags:
                - auth.registrations
            operationId: resendRegistrationConfirmation
            summary: Resend confirmation code email
            description: >
                Requests a new confirmation code.


                Security: SHOULD respond 202 even if the email is unknown (avoid enumeration).
            security: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ResendConfirmationRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
