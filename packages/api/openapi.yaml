                For formatId=league this MAY be omitted or `{}`.
            oneOf:
                - $ref: "#/components/schemas/LeagueFormatConfig"
                - $ref: "#/components/schemas/HeadsUpFormatConfig"
        LeagueFormatConfig:
            type: object
            additionalProperties: false
            description: |
                League format config.
                Currently empty because league behavior is driven by generic tournament settings.
            properties: {}
        HeadsUpRoundUnit:
            type: string
            description: Unit of competition for heads-up rounds.
            enum:
                - matchday
                - event
            default: matchday
        HeadsUpDurationType:
            type: string
            enum:
                - singleRound
                - fixedRounds
                - untilSeasonEnd
        HeadsUpVictoryCondition:
            type: string
            description: How the duel winner is determined.
            enum:
                - mostPointsTotal
                - mostRoundWins
        HeadsUpTieBreakerRule:
            type: object
            additionalProperties: false
            required:
                - kind
            properties:
                kind:
                    type: string
                    enum:
                        - metric
                        - draw
                    description: |
                        - metric: compare a numeric metric (game-mode-defined) desc by default.
                        - draw: accept draw (no winner) if all previous tie-breakers fail.
                metricId:
                    type: string
                    description: |
                        Stable metric id defined by game mode for tie-breaking.
                        Examples (ScorePrediction):
                        - scorePrediction.exactScore.count
                        - scorePrediction.correctOutcome.count
                    maxLength: 80
                order:
                    type: string
                    enum:
                        - desc
                        - asc
                    default: desc
        HeadsUpOnPlayerLeave:
            type: string
            description: Policy when one player leaves mid-duel.
            enum:
                - endNoContest
                - forfeit
            default: endNoContest
        HeadsUpDuration:
            type: object
            additionalProperties: false
            required:
                - type
            properties:
                type:
                    $ref: "#/components/schemas/HeadsUpDurationType"
                roundCount:
                    type: integer
                    minimum: 1
                    description: Required when type=fixedRounds.
                startMatchday:
                    type: integer
                    minimum: 1
                    description: Optional explicit starting matchday when roundUnit=matchday.
                endMatchday:
                    type: integer
                    minimum: 1
                    description: Optional explicit ending matchday when roundUnit=matchday.
            description: |
                Duration definition for a heads-up duel.

                Validation rules:
                - if type=fixedRounds => roundCount is required
                - if startMatchday/endMatchday both present => endMatchday >= startMatchday
        HeadsUpFormatConfig:
            type: object
            additionalProperties: false
            required:
                - roundUnit
                - duration
            properties:
                roundUnit:
                    $ref: "#/components/schemas/HeadsUpRoundUnit"
                duration:
                    $ref: "#/components/schemas/HeadsUpDuration"
                victoryCondition:
                    $ref: "#/components/schemas/HeadsUpVictoryCondition"
                tieBreakers:
                    type: array
                    description: Ordered list of tie-breakers. Server may apply defaults if omitted.
                    items:
                        $ref: "#/components/schemas/HeadsUpTieBreakerRule"
                requiresDirectInvite:
                    type: boolean
                    description: If true, duel requires a direct invitation (recommended default).
                    default: true
                onPlayerLeave:
                    $ref: "#/components/schemas/HeadsUpOnPlayerLeave"
        HeadsUpAcceptanceStatus:
            type: string
            enum:
                - pending
                - accepted
                - declined
                - expired
                - canceled
        HeadsUpAcceptance:
            type: object
            additionalProperties: false
            required:
                - status
                - challengerUserId
                - opponentUserId
            properties:
                status:
                    $ref: "#/components/schemas/HeadsUpAcceptanceStatus"
                challengerUserId:
                    $ref: "#/components/schemas/UserId"
                opponentUserId:
                    $ref: "#/components/schemas/UserId"
                expiresAt:
                    type: string
                    format: date-time
                respondedAt:
                    type: string
                    format: date-time
        TournamentJoinMode:
            type: string
            description: How players can join.
            enum:
                - open
                - code
                - closed
        TournamentJoinPolicy:
            type: object
            additionalProperties: false
            required:
                - joinMode
                - joinMidSeasonAllowed
                - locked
            properties:
                joinMode:
                    $ref: "#/components/schemas/TournamentJoinMode"
                joinMidSeasonAllowed:
                    type: boolean
                    description: If true, users can join after the tournament has started.
                maxPlayers:
                    type: integer
                    minimum: 2
                    description: Optional cap for players.
                locked:
                    type: boolean
                    description: >
                        If true, joining is locked regardless of joinMode. Controlled by
                        /lock endpoints.
                joinClosesAt:
                    type: string
                    format: date-time
                    description: Optional cutoff time for joining (useful for matchday tournaments).
        TournamentTiming:
            type: object
            additionalProperties: false
            description: Tournament time window within a competition season.
            required:
                - seasonId
            properties:
                competitionId:
                    $ref: "#/components/schemas/CompetitionId"
                seasonId:
                    $ref: "#/components/schemas/SeasonId"
                startMatchday:
                    type: integer
                    minimum: 1
                    description: Optional; if omitted, server derives from season.
                endMatchday:
                    type: integer
                    minimum: 1
                    description: Optional; if omitted, server derives from season.
                startsAt:
                    type: string
                    format: date-time
                    description: Optional computed start time (server-provided).
                endsAt:
                    type: string
                    format: date-time
                    description: Optional computed end time (server-provided).
        TournamentOrganizer:
            oneOf:
                - $ref: "#/components/schemas/TournamentOrganizerRankup"
                - $ref: "#/components/schemas/TournamentOrganizerUser"
                - $ref: "#/components/schemas/TournamentOrganizerCreator"
            discriminator:
                propertyName: type
                mapping:
                    rankup: "#/components/schemas/TournamentOrganizerRankup"
                    user: "#/components/schemas/TournamentOrganizerUser"
                    creator: "#/components/schemas/TournamentOrganizerCreator"
        TournamentOrganizerRankup:
            type: object
            additionalProperties: false
            required:
                - type
                - displayName
            properties:
                type:
                    type: string
                    enum:
                        - rankup
                displayName:
                    type: string
                    example: Rankup
        TournamentOrganizerUser:
            type: object
            additionalProperties: false
            required:
                - type
                - userId
                - displayName
            properties:
                type:
                    type: string
                    enum:
                        - user
                userId:
                    type: string
                displayName:
                    type: string
                    description: User display name (may be username).
                pictureUrl:
                    type: string
                    format: uri
        TournamentOrganizerCreator:
            type: object
            additionalProperties: false
            required:
                - type
                - creatorId
                - displayName
            properties:
                type:
                    type: string
                    enum:
                        - creator
                creatorId:
                    type: string
                    example: creator_01J8VZQ7QJ1Y6T4R3E2W1A0B9C
                displayName:
                    type: string
                logoUrl:
                    type: string
                    format: uri
        TournamentInclude:
            type: string
            enum:
                - myMembership
        TournamentMemberRole:
            type: string
            enum:
                - owner
                - admin
                - player
                - moderator
        MyMembershipSummary:
            type: object
            additionalProperties: false
            required:
                - role
                - joinedAt
            properties:
                role:
                    $ref: "#/components/schemas/TournamentMemberRole"
                joinedAt:
                    type: string
                    format: date-time
                archivedAt:
                    type: string
                    format: date-time
                    description: "Optional: user archived this tournament from their home list."
        TournamentSummary:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - name
                - visibility
                - discoverability
                - verificationStatus
                - sportId
                - gameModeId
                - formatId
                - modality
                - status
                - joinPolicy
                - memberCount
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                name:
                    type: string
                    maxLength: 80
                description:
                    type: string
                    maxLength: 2000
                heroImageUrl:
                    type: string
                    format: uri
                organizer:
                    $ref: "#/components/schemas/TournamentOrganizer"
                visibility:
                    $ref: "#/components/schemas/TournamentVisibility"
                discoverability:
                    $ref: "#/components/schemas/TournamentDiscoverability"
                verificationStatus:
                    $ref: "#/components/schemas/VerificationStatus"
                isRankedEligible:
                    type: boolean
                    description: True when the tournament counts for ranked progression/achievements.
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                formatId:
                    $ref: "#/components/schemas/TournamentFormatId"
                modality:
                    $ref: "#/components/schemas/TournamentModality"
                status:
                    $ref: "#/components/schemas/TournamentStatus"
                timing:
                    $ref: "#/components/schemas/TournamentTiming"
                joinPolicy:
                    $ref: "#/components/schemas/TournamentJoinPolicy"
                memberCount:
                    type: integer
                    minimum: 0
                eventId:
                    type: string
                    description: "Optional: linked official/verified event id (if applicable)."
                rewardSummary:
                    type: string
                    description: Optional non-betting reward summary (e.g., “PS5 + Gift Cards”).
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                formatConfig:
                    $ref: "#/components/schemas/TournamentFormatConfig"
                headsUpAcceptance:
                    $ref: "#/components/schemas/HeadsUpAcceptance"
                myMembership:
                    $ref: "#/components/schemas/MyMembershipSummary"
        Tournament:
            allOf:
                - $ref: "#/components/schemas/TournamentSummary"
                - type: object
                  additionalProperties: true
                  properties:
                      rulesetId:
                          $ref: "#/components/schemas/RulesetId"
                      formatConfig:
                          $ref: "#/components/schemas/TournamentFormatConfig"
                      headsUpAcceptance:
                          $ref: "#/components/schemas/HeadsUpAcceptance"
                      myMembership:
                          $ref: "#/components/schemas/MyMembershipSummary"
        TournamentPreview:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - name
                - visibility
                - verificationStatus
                - sportId
                - gameModeId
                - formatId
                - modality
                - status
                - joinPolicy
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                name:
                    type: string
                description:
                    type: string
                heroImageUrl:
                    type: string
                    format: uri
                organizer:
                    $ref: "#/components/schemas/TournamentOrganizer"
                visibility:
                    $ref: "#/components/schemas/TournamentVisibility"
                verificationStatus:
                    $ref: "#/components/schemas/VerificationStatus"
                isRankedEligible:
                    type: boolean
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                formatId:
                    $ref: "#/components/schemas/TournamentFormatId"
                modality:
                    $ref: "#/components/schemas/TournamentModality"
                status:
                    $ref: "#/components/schemas/TournamentStatus"
                timing:
                    $ref: "#/components/schemas/TournamentTiming"
                joinPolicy:
                    $ref: "#/components/schemas/TournamentJoinPolicy"
                memberCount:
                    type: integer
                    minimum: 0
                rewardSummary:
                    type: string
                cta:
                    type: string
                    description: Optional server-computed CTA label.
        TournamentDiscoverSort:
            type: string
            description: Sorting mode for discovery.
            enum:
                - popular
                - startingSoon
                - newest
                - endingSoon
        TournamentDiscoverCard:
            allOf:
                - $ref: "#/components/schemas/TournamentPreview"
                - type: object
                  additionalProperties: true
                  properties:
                      cta:
                          type: string
                          description: Optional server-computed CTA label.
                          examples:
                              - Join
                              - Enter code
                              - Closed
        TournamentDiscoverPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentDiscoverCard"
                nextCursor:
                    type: string
        MyTournamentItem:
            type: object
            additionalProperties: false
            required:
                - tournament
                - membership
            properties:
                tournament:
                    $ref: "#/components/schemas/TournamentSummary"
                membership:
                    $ref: "#/components/schemas/MyMembershipSummary"
                lastActivityAt:
                    type: string
                    format: date-time
                    description: Optional server-computed “last activity” time for ordering.
        MyTournamentPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/MyTournamentItem"
                nextCursor:
                    type: string
        DuelStatusFilter:
            type: string
            enum:
                - any
                - pending
                - active
                - finished
            default: any
        DuelInclude:
            type: string
            enum:
                - opponent
                - currentRound
            description: Optional expansions.
        DuelListItem:
            type: object
            additionalProperties: false
            required:
                - tournament
                - opponentUserId
            properties:
                tournament:
                    $ref: "#/components/schemas/TournamentSummary"
                opponentUserId:
                    $ref: "#/components/schemas/UserId"
                opponent:
                    $ref: "#/components/schemas/PublicUserProfile"
                currentRound:
                    type: object
                    additionalProperties: false
                    properties:
                        matchday:
                            type: integer
                            minimum: 1
                        status:
                            type: string
                            description: Server-defined round status label.
                            examples:
                                - timed
                                - live
                                - finished
                        locked:
                            type: boolean
        DuelPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/DuelListItem"
                nextCursor:
                    type: string
        CreateTournamentRequest:
            type: object
            additionalProperties: false
            required:
                - name
                - visibility
                - modality
                - sportId
                - gameModeId
                - joinPolicy
                - timing
            properties:
                name:
                    type: string
                    minLength: 1
                    maxLength: 80
                description:
                    type: string
                    maxLength: 2000
                visibility:
                    $ref: "#/components/schemas/TournamentVisibility"
                discoverability:
                    $ref: "#/components/schemas/TournamentDiscoverability"
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                formatId:
                    $ref: "#/components/schemas/TournamentFormatId"
                    default: league
                formatConfig:
                    $ref: "#/components/schemas/TournamentFormatConfig"
                opponentUserId:
                    $ref: "#/components/schemas/UserId"
                modality:
                    $ref: "#/components/schemas/TournamentModality"
                timing:
                    $ref: "#/components/schemas/TournamentTiming"
                joinPolicy:
                    $ref: "#/components/schemas/TournamentJoinPolicy"
                chatEnabled:
                    type: boolean
                    default: true
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                rulesetConfig:
                    type: object
                    additionalProperties: true
                    description: >
                        GameMode-specific rules configuration (advanced). Shape depends on
                        `gameModeId`.

                        For strict schemas, see /rulesets in the Rules block.
                    examples:
                        - resultScope: extra_time
                          lockPolicy:
                              type: kickoff
                          scoring:
                              correctOutcome: 8
                              exactScore: 6
                              exactGoalsOneTeam: 2
                              wrongGoalsBothTeamsNonDrawPenalty: -2
                          tieBreakers:
                              - mostExactScores
                              - mostCorrectOutcomes
                              - mostExactGoalsOneTeam
                              - earliestSubmission
                        - resultScope: regular
                          lockPolicy:
                              type: kickoff
                          scoring:
                              correctOutcome: 8
                              exactScore: 6
                              exactGoalsOneTeam: 2
        CreateDuelRequest:
            description: |
                Convenience create for heads-up duels.
                Equivalent to creating a tournament with formatId=headsUp and inviting opponent.
            allOf:
                - $ref: "#/components/schemas/CreateTournamentRequest"
                - type: object
                  additionalProperties: false
                  required:
                      - opponentUserId
                      - formatId
                  properties:
                      formatId:
                          type: string
                          enum:
                              - headsUp
                      formatConfig:
                          $ref: "#/components/schemas/HeadsUpFormatConfig"
                      opponentUserId:
                          $ref: "#/components/schemas/UserId"
        CreateRematchRequest:
            type: object
            additionalProperties: false
            description: Optional overrides for rematch creation.
            properties:
                name:
                    type: string
                    maxLength: 60
                startMatchday:
                    type: integer
                    minimum: 1
                formatConfigOverrides:
                    $ref: "#/components/schemas/HeadsUpFormatConfig"
        UpdateTournamentRequest:
            type: object
            additionalProperties: false
            description: >
                Partial update. Server determines which fields are mutable based on
                tournament status.
            properties:
                name:
                    type: string
                    minLength: 1
                    maxLength: 80
                description:
                    type: string
                    maxLength: 2000
                discoverability:
                    $ref: "#/components/schemas/TournamentDiscoverability"
                joinPolicy:
                    $ref: "#/components/schemas/TournamentJoinPolicy"
                chatEnabled:
                    type: boolean
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                rulesetConfig:
                    type: object
                    additionalProperties: true
                    description: GameMode-specific (advanced).
        LockTournamentRequest:
            type: object
            additionalProperties: false
            properties:
                reason:
                    type: string
                    maxLength: 200
                    description: Optional admin reason for audit logs.
        TransferTournamentOwnerRequest:
            type: object
            additionalProperties: false
            required:
                - newOwnerUserId
            properties:
                newOwnerUserId:
                    type: string
                    description: User id of an existing member who will become owner.
        DeleteTournamentRequest:
            type: object
            additionalProperties: false
            properties:
                reason:
                    type: string
                    maxLength: 200
                hardDelete:
                    type: boolean
                    description: >
                        If true, requests hard-delete. Server may ignore for
                        safety/compliance.
        TournamentDeletion:
            type: object
            additionalProperties: false
            required:
                - deletionId
                - tournamentId
                - status
                - requestedAt
            properties:
                deletionId:
                    type: string
                    example: tdel_01J8VZQ7QJ1Y6T4R3E2W1A0B9C
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                status:
                    type: string
                    enum:
                        - accepted
                        - scheduled
                        - completed
                requestedAt:
                    type: string
                    format: date-time
                scheduledFor:
                    type: string
                    format: date-time
        TournamentRules:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - gameModeId
                - sportId
                - isRankedEligible
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                sportId:
                    $ref: "#/components/schemas/SportId"
                isRankedEligible:
                    type: boolean
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                sections:
                    type: array
                    items:
                        $ref: "#/components/schemas/RulesSection"
        RulesSection:
            type: object
            additionalProperties: false
            required:
                - title
                - items
            properties:
                title:
                    type: string
                items:
                    type: array
                    items:
                        type: string
        TournamentMatchdayInclude:
            type: string
            enum:
                - availabilitySummary
        MatchdayAvailabilityState:
            type: string
            enum:
                - open
                - locked
                - finished
                - notStarted
            description: Server-derived availability status for gameplay.
        MatchdayAvailabilityReason:
            type: string
            enum:
                - open
                - tournamentArchived
                - tournamentCancelled
                - tournamentLocked
                - joinClosed
                - matchdayNotInTournamentWindow
                - matchdayNotStarted
                - matchdayFinished
        MatchdayAvailability:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - matchday
                - serverTime
                - state
                - canSubmit
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                serverTime:
                    type: string
                    format: date-time
                state:
                    $ref: "#/components/schemas/MatchdayAvailabilityState"
                canSubmit:
                    type: boolean
                reason:
                    $ref: "#/components/schemas/MatchdayAvailabilityReason"
                opensAt:
                    type: string
                    format: date-time
                    description: Optional (when known).
                locksAt:
                    type: string
                    format: date-time
                    description: >
                        Server-authoritative lock time for the matchday's gameplay window.

                        For per-match locking modes, this is typically the earliest match lock.
                closesAt:
                    type: string
                    format: date-time
                    description: Optional hard close time for submissions (if configured).
                message:
                    type: string
                    description: Optional localized hint for UI ("Locked", "Finished", etc).
        TournamentMatchdaySummary:
            type: object
            additionalProperties: false
            required:
                - matchday
                - status
                - matchCount
                - startsAt
                - endsAt
            properties:
                matchday:
                    type: integer
                    minimum: 1
                label:
                    type: string
                    description: Optional localized label (e.g., "Jornada 23", "Round of 16").
                status:
                    $ref: "#/components/schemas/MatchdayStatus"
                startsAt:
                    type: string
                    format: date-time
                endsAt:
                    type: string
                    format: date-time
                matchCount:
                    type: integer
                    minimum: 0
                isCurrent:
                    type: boolean
                    description: Convenience flag set by the server.
                availabilitySummary:
                    $ref: "#/components/schemas/MatchdayAvailability"
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                serverTime:
                    type: string
                    format: date-time
                previousMatchday:
                    type: integer
                    minimum: 1
                    description: Optional convenience pointer.
                nextMatchday:
                    type: integer
                    minimum: 1
                    description: Optional convenience pointer.
        TournamentMatchday:
            allOf:
                - $ref: "#/components/schemas/TournamentMatchdaySummary"
                - type: object
                  additionalProperties: true
                  required:
                      - tournamentId
                      - serverTime
                  properties:
                      tournamentId:
                          $ref: "#/components/schemas/TournamentId"
                      serverTime:
                          type: string
                          format: date-time
                      previousMatchday:
                          type: integer
                          minimum: 1
                          description: Optional convenience pointer.
                      nextMatchday:
                          type: integer
                          minimum: 1
                          description: Optional convenience pointer.
        TournamentMatchdayPage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentMatchdaySummary"
                nextCursor:
                    type: string
        MatchLockState:
            type: string
            enum:
                - open
                - locked
            description: Lock state for the match within the tournament context.
        TournamentMatch:
            description: Match plus tournament-context lock metadata.
            allOf:
                - $ref: "#/components/schemas/Match"
