      parent: live
      kind: nav
    - name: live.feed
      summary: Feed
      description: Personal activity feed (no global spam feed).
      parent: live
      kind: nav
    - name: live.stream
      summary: Streams
      description: SSE/polling for web clients (mobile push is external).
      parent: live
      kind: nav
    - name: users
      summary: Users
      description: Profile, preferences, privacy and user settings.
      kind: nav
    - name: users.me
      summary: Current user
      description: Operations scoped to the authenticated user.
      parent: users
      kind: nav
    - name: users.me.preferences
      summary: Preferences
      description: Locale, country, interests and other user preferences.
      parent: users.me
      kind: nav
    - name: users.me.privacy
      summary: Privacy
      description: Profile visibility and social/privacy controls.
      parent: users.me
      kind: nav
    - name: users.me.notifications
      summary: Notification preferences
      description: Notification channels, categories and quiet hours.
      parent: users.me
      kind: nav
    - name: users.me.devices
      summary: Devices
      description: Registered devices for push notifications.
      parent: users.me
      kind: nav
    - name: promotions
      summary: Promotions & rewards
      description: Official promotions and reward fulfillment (no betting / no gambling).
      kind: nav
    - name: promotions.catalog
      summary: Catalog
      description: Public promotion catalog and details (pre-join safe).
      parent: promotions
      kind: nav
    - name: promotions.participation
      summary: Participation
      description: Eligibility checks and opt-in/out (legal + transparency).
      parent: promotions
      kind: nav
    - name: promotions.rewards
      summary: Rewards
      description: My official rewards and claim/fulfillment workflow.
      parent: promotions
      kind: nav
    - name: ranked
      summary: Ranked
      description: Verified progression (global rating/ladder) driven only by
          ranked-eligible (verified) participation.
      kind: nav
    - name: ranked.meta
      summary: Meta
      description: Ranked system meta/config surfaces.
      parent: ranked
      kind: nav
    - name: ranked.tracks
      summary: Tracks
      description: Ranked tracks (ladders) define scope (game mode/sport) and
          progression rules.
      parent: ranked
      kind: nav
    - name: ranked.seasons
      summary: Seasons
      description: Ranked seasons per track (e.g., monthly/seasonal ladders).
      parent: ranked
      kind: nav
    - name: ranked.leaderboards
      summary: Leaderboards
      description: Ranked leaderboards for verified progression.
      parent: ranked
      kind: nav
    - name: ranked.me
      summary: My ranked
      description: My ranked profile, ratings, settings, and rating history.
      parent: ranked
      kind: nav
    - name: ranked.users
      summary: User ranked
      description: Public/permissioned ranked profile for users (privacy-aware).
      parent: ranked
      kind: nav
    - name: tournaments.rankings
      summary: Rankings
      description:
          Tournament leaderboards (season + matchday) and ranking windows
          (around me).
      parent: tournaments
      kind: nav
    - name: tournaments.results
      summary: Results
      description: Points and outcomes per match/matchday (supports provisional live scoring).
      parent: tournaments
      kind: nav
    - name: tournaments.live
      summary: Live
      description:
          Streaming/polling endpoints for live match + ranking updates (no
          spectator access).
      parent: tournaments
      kind: nav
    - name: social
      summary: Social
      description: Social graph primitives (friends, follows, blocks).
      kind: nav
    - name: social.friends
      summary: Friends
      description: Mutual relationships (friends) and friend list.
      parent: social
      kind: nav
    - name: social.friendRequests
      summary: Friend requests
      description: Friend request inbox/outbox (spam-controlled).
      parent: social
      kind: nav
    - name: social.follow
      summary: Follow
      description: One-way follows (followers/following).
      parent: social
      kind: nav
    - name: social.blocks
      summary: Blocks
      description: Blocking controls to prevent abuse and unwanted interactions.
      parent: social
      kind: nav
    - name: sports
      summary: Sports data
      description: Public sports catalog and schedules (read-only).
      kind: nav
    - name: sports.catalog
      summary: Catalog
      description: Sports, competitions, seasons, teams.
      parent: sports
      kind: nav
    - name: sports.schedule
      summary: Schedule
      description: Matchdays, matches, and match events.
      parent: sports
      kind: nav
    - name: stats
      summary: Stats & recaps
      description: Player-facing stats, tournament history recaps, and "wrapped" experiences.
      kind: nav
    - name: stats.me
      summary: My stats
      description: Personal stats and recap library (retention surfaces).
      parent: stats
      kind: nav
    - name: stats.users
      summary: User stats
      description: Public/permissioned stats for user profiles (privacy-aware).
      parent: stats
      kind: nav
    - name: stats.tournaments
      summary: Tournament stats
      description: Tournament and matchday stats/recaps (member-only; no spectators).
      parent: stats
      kind: nav
    - name: stats.recaps
      summary: Recaps
      description: Wrapped/recap resources and cards (shareable assets optional).
      parent: stats
      kind: nav
    - name: tournaments.submissions
      summary: Submissions
      description: Mode-agnostic gameplay submissions inside tournaments (member-only).
      parent: tournaments
      kind: nav
    - name: tournaments.invites
      summary: Invites
      description: Direct invitations to specific users (spam-controlled).
      parent: tournaments
      kind: nav
    - name: tournaments.members
      summary: Members
      description: Membership (join/leave), member listing, and admin moderation.
      parent: tournaments
      kind: nav
    - name: tournaments
      summary: Tournaments
      description: Tournament creation, discovery, preview, and lifecycle controls.
      kind: nav
    - name: tournaments.core
      summary: Core
      description: Create, list, and read tournament resources.
      parent: tournaments
      kind: nav
    - name: tournaments.duels
      summary: Duels (1v1)
      description: Convenience endpoints for heads-up tournaments (format=headsUp).
      parent: tournaments
      kind: nav
    - name: tournaments.preview
      summary: Preview
      description: Minimal pre-join preview (no spectator gameplay).
      parent: tournaments
      kind: nav
    - name: tournaments.lifecycle
      summary: Lifecycle
      description: Locking, archiving, ownership transfer, deletion.
      parent: tournaments
      kind: nav
    - name: tournaments.matchdays
      summary: Matchdays
      description: Tournament matchday navigation (member-only).
      parent: tournaments
      kind: nav
    - name: trustSafety
      summary: Trust & Safety
      description: Reporting, enforcement, safety policies, and user-facing safety surfaces.
      kind: nav
    - name: trustSafety.reporting
      summary: Reporting
      description:
          User reports for abuse/spam across chat, profiles, tournaments, and
          content.
      parent: trustSafety
      kind: nav
    - name: trustSafety.blocks
      summary: Blocking
      description: Safety-related user blocking endpoints (overlaps with Social
          blocks; here for enforcement context).
      parent: trustSafety
      kind: nav
    - name: trustSafety.enforcement
      summary: Enforcement
      description:
          User-facing enforcement status and appeals (no internal staff tools
          exposed).
      parent: trustSafety
      kind: nav
    - name: trustSafety.policies
      summary: Policies
      description: Public policy documents and safety configuration.
      parent: trustSafety
      kind: nav
    - name: uploads
      summary: Uploads & Media
      description: Upload flows and media asset registry (avatars, branding, assets).
      kind: nav
    - name: uploads.uploads
      summary: Upload sessions
      description: Pre-signed upload sessions (direct-to-storage) and completion.
      parent: uploads
      kind: nav
    - name: uploads.media
      summary: Media assets
      description: Media metadata and variant URLs (CDN/signed).
      parent: uploads
      kind: nav
    - name: users.directory
      summary: Directory
      description: Search and resolve other users (anti-scraping, privacy-aware).
      parent: users
      kind: nav
    - name: users.history
      summary: Public history
      description: Verified/public highlights from a user's play history (privacy-aware).
      parent: users
      kind: nav
    - name: verified
      summary: Verified hub
      description:
          Curated hub for verified/official events and tournaments (anti-spam
          discovery).
      kind: nav
    - name: verified.hub
      summary: Hub
      description: Curated discovery surfaces (no global free search by default).
      parent: verified
      kind: nav
    - name: verified.events
      summary: Events
      description: Verified events (time-boxed challenges, seasons, leagues, promotions).
      parent: verified
      kind: nav
    - name: verified.tournaments
      summary: Tournaments
      description:
          Verified tournaments listing/preview (join requires membership; no
          spectators).
      parent: verified
      kind: nav
security:
    - BearerAuth: []
paths:
    /healthz:
        get:
            tags:
                - meta.health
            operationId: getHealthz
            summary: Liveness health check
            description: >
                Liveness probe. Use to determine whether the service process is running
                and able to respond.

                This endpoint **must not** depend on external downstream services (DB, caches, providers),

                otherwise it becomes flaky and unusable for orchestration.


                Intended for load balancers / k8s liveness checks.
            security: []
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Service is alive.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                    content:
                        text/plain:
                            schema:
                                type: string
                            examples:
                                ok:
                                    value: ok
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthCheck"
                            examples:
                                ok:
                                    value:
                                        status: ok
                                        serverTime: 2026-01-31T12:00:00Z
                                        uptimeSeconds: 12345
                                        build:
                                            service: rankup-api
                                            environment: prod
                                            version: 0.1.0
                                            commitSha: a1b2c3d4
                                            builtAt: 2026-01-31T10:00:00Z
                "503":
                    description: Service is not alive (rare; typically only on fatal internal state).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Retry-After:
                            $ref: "#/components/headers/Retry-After"
                    content:
                        text/plain:
                            schema:
                                type: string
                            examples:
                                unavailable:
                                    value: unavailable
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthCheck"
                            examples:
                                unavailable:
                                    value:
                                        status: unavailable
                                        serverTime: 2026-01-31T12:00:00Z
                                        uptimeSeconds: 12345
                                        build:
                                            service: rankup-api
                                            environment: prod
                                            version: 0.1.0
                                            commitSha: a1b2c3d4
                                            builtAt: 2026-01-31T10:00:00Z
    /readyz:
        get:
            tags:
                - meta.health
            operationId: getReadyz
            summary: Readiness health check
            description: >
                Readiness probe. Use to determine whether the service is ready to
                receive traffic.


                This endpoint **may** validate critical dependencies (DB connectivity, cache, message bus,

                sports-data provider availability, etc). If not ready, returns **503**.
            security: []
            parameters:
                - name: verbose
                  in: query
                  description: >
                      If true, returns per-dependency check statuses.

                      Keep details non-sensitive; never expose secrets or internal topology.
                  required: false
                  schema:
                      type: boolean
                      default: false
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Service is ready.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ReadinessCheck"
                            examples:
                                ready:
                                    value:
                                        status: ready
                                        serverTime: 2026-01-31T12:00:00Z
                                        checks:
                                            - name: database
                                              status: ok
                                              observedAt: 2026-01-31T12:00:00Z
                                            - name: sportsProvider
                                              status: ok
                                              observedAt: 2026-01-31T12:00:00Z
                "503":
                    description: Service is not ready (temporarily).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Retry-After:
                            $ref: "#/components/headers/Retry-After"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ReadinessCheck"
                            examples:
                                notReady:
                                    value:
                                        status: notReady
                                        serverTime: 2026-01-31T12:00:00Z
                                        checks:
                                            - name: database
                                              status: fail
                                              observedAt: 2026-01-31T12:00:00Z
    /app/config:
        get:
            tags:
                - meta.config
            operationId: getAppConfig
            summary: Get public app configuration
            description: >
                Public configuration used by clients (mobile/web) to bootstrap UI
                decisions:

                - supported locales

                - maintenance status

                - client minimum/recommended versions

                - feature flags (non-sensitive)

                - legal/support URLs


                This endpoint is designed to be safely cacheable and supports **ETag** + **304**.
            security: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/If-None-Match"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Current public config.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        ETag:
                            $ref: "#/components/headers/ETag"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-Public-Short"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AppConfig"
                            examples:
                                example:
                                    value:
                                        apiVersion: 2026-01-31
                                        serverTime: 2026-01-31T12:00:00Z
                                        environment: prod
                                        locales:
                                            default: en
                                            supported:
                                                - en
                                                - es
                                                - pt-PT
                                        clientPolicy:
                                            ios:
                                                minimum: 1.0.0
                                                recommended: 1.2.0
                                                updateUrl: https://apps.apple.com/app/id000000000
                                            android:
                                                minimum: 1.0.0
                                                recommended: 1.2.0
                                                updateUrl: https://play.google.com/store/apps/details?id=com.rankup
                                            web:
                                                minimum: 2026.01.01
                                                recommended: 2026.01.31
                                        maintenance:
                                            mode: none
                                        featureFlags:
                                            rankedEnabled: true
                                            chatEnabledByDefault: true
                                            exploreEnabled: true
                                        urls:
                                            statusPageUrl: https://status.rankup.example.com
                                            termsOfServiceUrl: https://rankup.example.com/terms
                                            privacyPolicyUrl: https://rankup.example.com/privacy
                                            supportUrl: https://rankup.example.com/support
                "304":
                    description: Not modified. Use cached version.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        ETag:
                            $ref: "#/components/headers/ETag"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-Public-Short"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    /app/bootstrap:
        get:
            tags:
                - meta.config
            operationId: getAppBootstrap
            summary: Get bootstrap payload for app startup
            description: >
                Aggregated payload to reduce startup round-trips for clients.


                **Auth is optional**:

                - Anonymous: returns only public sections.

                - Authenticated: may include `me` and other personalized sections if requested via `include`.


                Avoid turning this into a “god endpoint”.

                Add sections only when they materially reduce latency and improve perceived app responsiveness.
            security:
                - {}
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: include
                  in: query
                  description: |
                      Optional sections to include. CSV recommended (explode=false).
                      Unknown values must be ignored for forward compatibility.
                  required: false
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/BootstrapInclude"
                  examples:
                      minimal:
                          value: []
                      common:
                          value:
                              - me
                              - unreadCounts
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Bootstrap payload (public + optional personalized sections).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AppBootstrap"
                            examples:
                                anonymousMinimal:
                                    value:
                                        serverTime: 2026-01-31T12:00:00Z
                                        config:
                                            apiVersion: 2026-01-31
                                            serverTime: 2026-01-31T12:00:00Z
                                            environment: prod
                                            locales:
                                                default: en
                                                supported:
                                                    - en
                                                    - es
                                                    - pt-PT
                                            clientPolicy:
                                                ios:
                                                    minimum: 1.0.0
                                                    recommended: 1.2.0
                                                    updateUrl: https://apps.apple.com/app/id000000000
                                                android:
                                                    minimum: 1.0.0
                                                    recommended: 1.2.0
                                                    updateUrl: https://play.google.com/store/apps/details?id=com.rankup
                                                web:
                                                    minimum: 2026.01.01
                                                    recommended: 2026.01.31
                                            maintenance:
                                                mode: none
                                            featureFlags:
                                                rankedEnabled: true
                                                exploreEnabled: true
                                            urls:
                                                statusPageUrl: https://status.rankup.example.com
                                                termsOfServiceUrl: https://rankup.example.com/terms
                                                privacyPolicyUrl: https://rankup.example.com/privacy
                                                supportUrl: https://rankup.example.com/support
                                authenticatedWithMe:
                                    value:
                                        serverTime: 2026-01-31T12:00:00Z
                                        config:
                                            apiVersion: 2026-01-31
                                            serverTime: 2026-01-31T12:00:00Z
                                            environment: prod
                                            locales:
                                                default: en
                                                supported:
                                                    - en
                                                    - es
                                            clientPolicy:
                                                ios:
                                                    minimum: 1.0.0
                                                    recommended: 1.2.0
                                                    updateUrl: https://apps.apple.com/app/id000000000
                                                android:
                                                    minimum: 1.0.0
                                                    recommended: 1.2.0
                                                    updateUrl: https://play.google.com/store/apps/details?id=com.rankup
                                                web:
                                                    minimum: 2026.01.01
                                                    recommended: 2026.01.31
                                            maintenance:
                                                mode: none
                                            featureFlags:
                                                rankedEnabled: true
                                                exploreEnabled: true
                                            urls:
                                                statusPageUrl: https://status.rankup.example.com
                                                termsOfServiceUrl: https://rankup.example.com/terms
                                                privacyPolicyUrl: https://rankup.example.com/privacy
                                                supportUrl: https://rankup.example.com/support
                                        me:
