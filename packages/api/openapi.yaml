      kind: nav
    - name: creators.directory
      summary: Directorio
      description: Creator discovery surfaces (curated + searchable).
      parent: creators
      kind: nav
    - name: creators.catalog
      summary: Catálogo
      description: Creator catalog of events/tournaments/collections (pre-join safe).
      parent: creators
      kind: nav
    - name: game
      summary: Game modes & rules
      description: Registries for game modes and scoring rulesets (versioned, extensible).
      kind: nav
    - name: game.modes
      summary: Game modes
      description: Available game modes and their capabilities.
      parent: game
      kind: nav
    - name: game.rulesets
