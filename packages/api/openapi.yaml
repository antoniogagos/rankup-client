            operationId: deleteMe
            summary: Request account deletion
            description: >
                Requests deletion of the current account.


                High-safety behavior:

                - May schedule deletion with a grace window (recommended).

                - May require step-up verification (password re-entry or provider token) depending on risk policy.

                - Must be idempotent when `X-Idempotency-Key` is provided.
            security:
