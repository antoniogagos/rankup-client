        RankedTrackScopeKind:
            type: string
            description: >
                Scope kind for a track. This is what makes the "single vs separate
                ladder" decision flexible.
            enum:
                - allGamesAllSports
                - gameModeAllSports
                - gameModeSport
                - custom
        RankedRatingModel:
            type: string
            description: Rating model used for the track.
            enum:
                - elo
                - ladderPoints
                - mmr
        RankedVisibility:
            type: string
            description: Visibility of ranked participation for a viewer.
            enum:
                - public
                - friends
                - private
        RankedEligibilityPolicy:
            type: object
            additionalProperties: false
            description: Defines what participation impacts ranked progression.
            required:
                - requiresVerified
                - requiresEloEnabled
            properties:
                requiresVerified:
                    type: boolean
                    description: If true, only verified/curated participation counts.
                requiresEloEnabled:
                    type: boolean
                    description: If true, only tournaments/events with eloEnabled=true count.
                allowedVerifiedEventIds:
                    type: array
                    description:
                        Optional allow-list (when ranked is confined to specific official
                        events).
                    items:
                        $ref: "#/components/schemas/VerifiedEventId"
                notes:
                    type: string
                    description: Localized short explanation shown to users.
        RankedTierId:
            type: string
            description: Stable tier identifier.
            example: tier_gold
        RankedTierRewardPreview:
            type: object
            additionalProperties: false
            properties:
                rewardType:
                    type: string
                    description:
                        Visual-only rewards (no "skins" requirement; can still be
                        frames/titles/badges).
                    enum:
                        - badge
                        - title
                        - profileFrame
                        - emote
                        - recapCard
                rewardId:
                    type: string
                label:
                    type: string
                    description: Localized label.
                imageUrl:
                    type: string
                    format: uri
        RankedTierDefinition:
            type: object
            additionalProperties: false
            required:
                - tierId
                - name
            properties:
                tierId:
                    $ref: "#/components/schemas/RankedTierId"
                name:
                    type: string
                    description: Localized tier name.
                description:
                    type: string
                    description: Localized short description.
                iconUrl:
                    type: string
                    format: uri
                minRating:
                    type: integer
                    description: Inclusive min rating for this tier (rating model dependent).
                maxRating:
                    type: integer
                    description: Exclusive max rating for this tier (rating model dependent).
                rewards:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedTierRewardPreview"
        RankedTrackScope:
            type: object
            additionalProperties: false
            required:
                - scopeKind
            properties:
                scopeKind:
                    $ref: "#/components/schemas/RankedTrackScopeKind"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                sportId:
                    $ref: "#/components/schemas/SportId"
                formatId:
                    $ref: "#/components/schemas/TournamentFormatId"
                region:
                    type: string
                    maxLength: 32
                    description: Optional region key (server-defined).
        RankedSeasonCadence:
            type: string
            enum:
                - monthly
                - seasonal
                - yearly
                - none
        RankedTrackSummary:
            type: object
            additionalProperties: false
            required:
                - rankedTrackId
                - status
                - name
                - ratingModel
                - scope
            properties:
                rankedTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                status:
                    $ref: "#/components/schemas/RankedTrackStatus"
                name:
                    type: string
                    description: Localized track name.
                description:
                    type: string
                ratingModel:
                    $ref: "#/components/schemas/RankedRatingModel"
                cadence:
                    $ref: "#/components/schemas/RankedSeasonCadence"
                scope:
                    $ref: "#/components/schemas/RankedTrackScope"
                activeSeasonId:
                    $ref: "#/components/schemas/RankedSeasonId"
                featured:
                    type: boolean
                heroImageUrl:
                    type: string
                    format: uri
        RankedTrack:
            allOf:
                - $ref: "#/components/schemas/RankedTrackSummary"
                - type: object
                  additionalProperties: false
                  properties:
                      eligibility:
                          $ref: "#/components/schemas/RankedEligibilityPolicy"
                      tiers:
                          type: array
                          items:
                              $ref: "#/components/schemas/RankedTierDefinition"
                      activeSeason:
                          $ref: "#/components/schemas/RankedSeason"
        RankedTrackPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedTrackSummary"
                nextCursor:
                    type: string
        RankedSeasonSummary:
            type: object
            additionalProperties: false
            required:
                - rankedSeasonId
                - status
                - startsAt
                - endsAt
            properties:
                rankedSeasonId:
                    $ref: "#/components/schemas/RankedSeasonId"
                status:
                    $ref: "#/components/schemas/RankedSeasonStatus"
                title:
                    type: string
                    description: Localized title (e.g., "Febrero 2026").
                startsAt:
                    type: string
                    format: date-time
                endsAt:
                    type: string
                    format: date-time
                joinOpensAt:
                    type: string
                    format: date-time
                joinClosesAt:
                    type: string
                    format: date-time
        RankedSeason:
            allOf:
                - $ref: "#/components/schemas/RankedSeasonSummary"
                - type: object
                  additionalProperties: false
                  properties:
                      eligibility:
                          $ref: "#/components/schemas/RankedEligibilityPolicy"
                      recapRecapType:
                          type: string
                          description:
                              Hint for recap system integration (e.g., use RecapType
                              seasonal/monthly).
                          examples:
                              - monthly
                              - seasonal
        RankedSeasonPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedSeasonSummary"
                nextCursor:
                    type: string
        RankedMeta:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - defaultTrackId
            properties:
                serverTime:
                    type: string
                    format: date-time
                defaultTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                tracks:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedTrackSummary"
                notes:
                    type: string
                    description: Localized ranked disclaimer/explanation.
        RankedTierProgress:
            type: object
            additionalProperties: false
            required:
                - tierId
            properties:
                tierId:
                    $ref: "#/components/schemas/RankedTierId"
                rating:
                    type: integer
                    description: Current rating value (model dependent).
                nextTierId:
                    $ref: "#/components/schemas/RankedTierId"
                nextTierAtRating:
                    type: integer
                progressToNextTier:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
        RankedStandingBase:
            type: object
            additionalProperties: false
            required:
                - rankedTrackId
                - seasonId
                - rating
                - tier
            properties:
                rankedTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                seasonId:
                    $ref: "#/components/schemas/RankedSeasonId"
                rating:
                    type: integer
                tier:
                    $ref: "#/components/schemas/RankedTierProgress"
                provisional:
                    type: boolean
                    description:
                        True when rating is subject to recalculation due to
                        pending/corrected results.
                updatedAt:
                    type: string
                    format: date-time
        RankedLeaderboardView:
            type: string
            enum:
                - top
                - aroundMe
                - friends
            default: top
        RankedLeaderboardEntry:
            type: object
            additionalProperties: false
            required:
                - position
                - rating
            properties:
                position:
                    type: integer
                    minimum: 1
                user:
                    $ref: "#/components/schemas/MeSummary"
                rating:
                    type: integer
                tierId:
                    $ref: "#/components/schemas/RankedTierId"
                deltaSinceYesterday:
                    type: integer
                    description: Optional approximate delta signal (server-defined cadence).
                percentile:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
        RankedLeaderboard:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - rankedTrackId
                - seasonId
                - view
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                rankedTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                seasonId:
                    $ref: "#/components/schemas/RankedSeasonId"
                view:
                    $ref: "#/components/schemas/RankedLeaderboardView"
                region:
                    type: string
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedLeaderboardEntry"
                nextCursor:
                    type: string
                    description: Present for `top` view.
                myEntry:
                    $ref: "#/components/schemas/RankedLeaderboardEntry"
                tiers:
                    type: array
                    description: Optional tier definitions for client rendering (when include=tiers).
                    items:
                        $ref: "#/components/schemas/RankedTierDefinition"
        RankedSettings:
            type: object
            additionalProperties: false
            required:
                - defaultVisibility
            properties:
                defaultVisibility:
                    $ref: "#/components/schemas/RankedVisibility"
                perTrackVisibility:
                    type: object
                    additionalProperties:
                        $ref: "#/components/schemas/RankedVisibility"
                    description: Map of rankedTrackId -> visibility.
                showOnPublicLeaderboards:
                    type: boolean
                    default: true
                    description:
                        If false, user is excluded from public boards (still sees own
                        progress).
                allowFriendComparisons:
                    type: boolean
                    default: true
        UpdateRankedSettingsRequest:
            type: object
            additionalProperties: false
            properties:
                defaultVisibility:
                    $ref: "#/components/schemas/RankedVisibility"
                perTrackVisibility:
                    type: object
                    additionalProperties:
                        $ref: "#/components/schemas/RankedVisibility"
                showOnPublicLeaderboards:
                    type: boolean
                allowFriendComparisons:
                    type: boolean
        MyRankedTrackStanding:
            allOf:
                - $ref: "#/components/schemas/RankedStandingBase"
                - type: object
                  additionalProperties: false
                  required:
                      - me
                  properties:
                      me:
                          $ref: "#/components/schemas/MeSummary"
                      position:
                          type: integer
                          minimum: 1
                          description: My current leaderboard position (if eligible/visible).
                      percentile:
                          type: number
                          format: float
                          minimum: 0
                          maximum: 1
                      lastDelta:
                          $ref: "#/components/schemas/RankedHistoryEvent"
        PublicRankedTrackStanding:
            allOf:
                - $ref: "#/components/schemas/RankedStandingBase"
                - type: object
                  additionalProperties: false
                  properties:
                      user:
                          $ref: "#/components/schemas/MeSummary"
                      position:
                          type: integer
                          minimum: 1
                      percentile:
                          type: number
                          format: float
                          minimum: 0
                          maximum: 1
        MyRankedProfile:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - user
                - tracks
            properties:
                serverTime:
                    type: string
                    format: date-time
                user:
                    $ref: "#/components/schemas/MeSummary"
                tracks:
                    type: array
                    items:
                        $ref: "#/components/schemas/MyRankedTrackStanding"
        PublicRankedProfile:
            type: object
            additionalProperties: false
            required:
                - user
                - tracks
            properties:
                user:
                    $ref: "#/components/schemas/MeSummary"
                tracks:
                    type: array
                    items:
                        $ref: "#/components/schemas/PublicRankedTrackStanding"
        RankedHistoryEventId:
            type: string
            example: rhe_01J8W0K7E2ZQZ6P0M4NQW2Y7DA
        RankedHistorySourceType:
            type: string
            enum:
                - tournament
                - matchday
                - correction
                - seasonReset
        RankedHistorySource:
            type: object
            additionalProperties: false
            required:
                - type
            properties:
                type:
                    $ref: "#/components/schemas/RankedHistorySourceType"
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                verifiedEventId:
                    $ref: "#/components/schemas/VerifiedEventId"
                note:
                    type: string
                    description: Localized short explanation.
        RankedHistoryEvent:
            type: object
            additionalProperties: false
            required:
                - eventId
                - rankedTrackId
                - seasonId
                - occurredAt
                - deltaRating
                - newRating
                - source
            properties:
                eventId:
                    $ref: "#/components/schemas/RankedHistoryEventId"
                rankedTrackId:
                    $ref: "#/components/schemas/RankedTrackId"
                seasonId:
                    $ref: "#/components/schemas/RankedSeasonId"
                occurredAt:
                    type: string
                    format: date-time
                deltaRating:
                    type: integer
                    description: Can be negative.
                newRating:
                    type: integer
                oldTierId:
                    $ref: "#/components/schemas/RankedTierId"
                newTierId:
                    $ref: "#/components/schemas/RankedTierId"
                source:
                    $ref: "#/components/schemas/RankedHistorySource"
                provisional:
                    type: boolean
                    description: True when this change may still be recalculated.
        RankedHistoryPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankedHistoryEvent"
                nextCursor:
                    type: string
        RankingScope:
            type: string
            enum:
                - season
                - matchday
        RankingState:
            type: string
            description: >
                Indicates whether the leaderboard is final or can still change due to
                live matches.
            enum:
                - provisional
                - final
        RankingView:
            type: string
            description: Controls returned fields density.
            enum:
                - compact
                - full
            default: compact
        RankingInclude:
            type: string
            enum:
                - myEntry
        RankingEntry:
            type: object
            additionalProperties: false
            required:
                - position
                - user
                - points
            properties:
                position:
                    type: integer
                    minimum: 1
                user:
                    $ref: "#/components/schemas/MeSummary"
                points:
                    type: integer
                    description: Total points for the scope (season or matchday).
                pointsState:
                    $ref: "#/components/schemas/RankingState"
                metrics:
                    type: object
                    additionalProperties:
                        type: number
                    description: >
                        Extra tie-break / stats metrics for sorting and UI (mode-specific).

                        Example keys for ScorePrediction: exactScores, correctOutcomes, exactGoalsOneTeam.
                lastUpdatedAt:
                    type: string
                    format: date-time
        HeadsUpScoreboardEntry:
            type: object
            additionalProperties: false
            required:
                - position
                - user
                - points
            properties:
                position:
                    type: integer
                    minimum: 1
                    maximum: 2
                user:
                    $ref: "#/components/schemas/MeSummary"
                points:
                    type: integer
                    description: Total points for the scope (season or matchday).
                pointsState:
                    $ref: "#/components/schemas/RankingState"
                metrics:
                    type: object
                    additionalProperties:
                        type: number
                lastUpdatedAt:
                    type: string
                    format: date-time
        HeadsUpRoundSummary:
            type: object
            additionalProperties: false
            properties:
                matchday:
                    type: integer
                    minimum: 1
                state:
                    $ref: "#/components/schemas/RankingState"
                pointsA:
                    type: integer
                pointsB:
                    type: integer
                winnerUserId:
                    $ref: "#/components/schemas/UserId"
        HeadsUpOverallSummary:
            type: object
            additionalProperties: false
            properties:
                winnerUserId:
                    $ref: "#/components/schemas/UserId"
                roundWinsA:
                    type: integer
                    minimum: 0
                roundWinsB:
                    type: integer
                    minimum: 0
                totalPointsA:
                    type: integer
                totalPointsB:
                    type: integer
                outcome:
                    type: string
                    description: Outcome from the requesting user's perspective (if applicable).
                    enum:
                        - win
                        - loss
                        - draw
        HeadsUpScoreboard:
            type: object
            additionalProperties: false
            required:
                - players
            properties:
                players:
                    type: array
                    minItems: 2
                    maxItems: 2
                    description: >
                        Ordered players list. When rounds/overall include A/B values, A/B map to
                        this array order.
                    items:
                        $ref: "#/components/schemas/HeadsUpScoreboardEntry"
                rounds:
                    type: array
                    items:
                        $ref: "#/components/schemas/HeadsUpRoundSummary"
                overall:
                    $ref: "#/components/schemas/HeadsUpOverallSummary"
        TournamentRankingMeta:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - scope
                - state
                - serverTime
                - computedAt
                - totalPlayers
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                scope:
                    $ref: "#/components/schemas/RankingScope"
                matchday:
                    type: integer
                    minimum: 1
                    description: Present when scope=matchday.
                state:
                    $ref: "#/components/schemas/RankingState"
                serverTime:
                    type: string
                    format: date-time
                computedAt:
                    type: string
                    format: date-time
                totalPlayers:
                    type: integer
                    minimum: 0
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                tieBreakers:
                    type: array
                    description: Ordered tie-breakers (from ruleset config).
                    items:
                        $ref: "#/components/schemas/RankingTieBreaker"
        TournamentRankingPage:
            type: object
            additionalProperties: false
            required:
                - meta
                - items
            properties:
                meta:
                    $ref: "#/components/schemas/TournamentRankingMeta"
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankingEntry"
                headsup:
                    $ref: "#/components/schemas/HeadsUpScoreboard"
                myEntry:
                    $ref: "#/components/schemas/RankingEntry"
                nextCursor:
                    type: string
        TournamentRankingWindow:
            type: object
            additionalProperties: false
            required:
                - meta
                - center
                - items
            properties:
                meta:
                    $ref: "#/components/schemas/TournamentRankingMeta"
                headsup:
                    $ref: "#/components/schemas/HeadsUpScoreboard"
                center:
                    $ref: "#/components/schemas/RankingEntry"
                items:
                    type: array
                    description: |
                        Window of entries around the center user (sorted by position).
                    items:
                        $ref: "#/components/schemas/RankingEntry"
        ResultInclude:
            type: string
            enum:
                - breakdown
        ResultState:
            type: string
            description: State of a per-match points computation.
            enum:
                - pending
                - provisional
                - final
                - void
        ScorePredictionResultBreakdown:
            type: object
            additionalProperties: false
            properties:
                correctOutcome:
                    type: integer
                exactScore:
                    type: integer
                exactGoalsOneTeam:
                    type: integer
                penalties:
                    type: integer
                bonuses:
                    type: integer
        ScorePredictionMatchResultLine:
            type: object
            additionalProperties: false
            required:
                - matchId
                - state
            properties:
                matchId:
                    $ref: "#/components/schemas/MatchId"
                match:
                    $ref: "#/components/schemas/Match"
                prediction:
                    type: object
                    additionalProperties: false
                    properties:
                        homeScore:
                            type: integer
                            minimum: 0
                            nullable: true
                        awayScore:
                            type: integer
                            minimum: 0
                            nullable: true
                        visibility:
                            $ref: "#/components/schemas/SubmissionVisibility"
                actualScore:
                    type: object
                    additionalProperties: false
                    description: >
                        Final match score used for scoring, based on the ruleset
                        `resultScope` (penalty shootout excluded).
                    properties:
                        home:
                            type: integer
                            minimum: 0
                            nullable: true
                        away:
                            type: integer
                            minimum: 0
                            nullable: true
                points:
                    type: integer
                    nullable: true
                    description: Null when state=pending/void and points are not applicable.
                state:
                    $ref: "#/components/schemas/ResultState"
                breakdown:
                    $ref: "#/components/schemas/ScorePredictionResultBreakdown"
        ScorePredictionMatchdayResults:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - matchday
                - gameModeId
                - user
                - serverTime
                - state
                - totalPoints
                - lines
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                gameModeId:
                    type: string
                    enum:
                        - scorePrediction
                user:
                    $ref: "#/components/schemas/MeSummary"
                serverTime:
                    type: string
                    format: date-time
                state:
                    $ref: "#/components/schemas/RankingState"
                totalPoints:
                    type: integer
                pointsState:
                    $ref: "#/components/schemas/RankingState"
                lines:
                    type: array
                    items:
                        $ref: "#/components/schemas/ScorePredictionMatchResultLine"
        GenericMatchdayResults:
            type: object
            additionalProperties: true
            required:
                - tournamentId
                - matchday
                - gameModeId
                - user
                - serverTime
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                gameModeId:
                    allOf:
                        - $ref: "#/components/schemas/GameModeId"
                        - not:
                              const: scorePrediction
                user:
                    $ref: "#/components/schemas/MeSummary"
                serverTime:
                    type: string
                    format: date-time
        MatchdayResults:
            oneOf:
                - $ref: "#/components/schemas/ScorePredictionMatchdayResults"
                - $ref: "#/components/schemas/GenericMatchdayResults"
            discriminator:
                propertyName: gameModeId
                mapping:
                    scorePrediction: "#/components/schemas/ScorePredictionMatchdayResults"
        MatchdayTopPerformer:
            type: object
            additionalProperties: false
            required:
                - user
                - points
                - position
            properties:
                position:
                    type: integer
                    minimum: 1
                user:
                    $ref: "#/components/schemas/MeSummary"
                points:
                    type: integer
        MatchdayResultsSummary:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - matchday
                - serverTime
                - state
                - topPerformers
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                serverTime:
                    type: string
                    format: date-time
                state:
                    $ref: "#/components/schemas/RankingState"
                topPerformers:
                    type: array
                    items:
                        $ref: "#/components/schemas/MatchdayTopPerformer"
                headsupRound:
                    $ref: "#/components/schemas/HeadsUpRoundSummary"
        LiveTopic:
            type: string
            enum:
                - matchEvents
                - ranking
                - results
                - tournament
        RankingDelta:
            type: object
            additionalProperties: false
            required:
                - userId
                - oldPosition
                - newPosition
                - pointsDelta
                - totalPoints
            properties:
                userId:
                    type: string
                oldPosition:
                    type: integer
                    minimum: 1
                    nullable: true
                newPosition:
                    type: integer
                    minimum: 1
                pointsDelta:
                    type: integer
                totalPoints:
                    type: integer
        TournamentUpdateEvent:
            oneOf:
                - $ref: "#/components/schemas/RankingDeltaEvent"
                - $ref: "#/components/schemas/MatchEventUpdate"
                - $ref: "#/components/schemas/MatchUpdatedEvent"
                - $ref: "#/components/schemas/ResultsUpdatedEvent"
            discriminator:
                propertyName: type
                mapping:
                    ranking.delta: "#/components/schemas/RankingDeltaEvent"
                    match.event: "#/components/schemas/MatchEventUpdate"
                    match.updated: "#/components/schemas/MatchUpdatedEvent"
                    results.updated: "#/components/schemas/ResultsUpdatedEvent"
        RankingDeltaEvent:
            type: object
            additionalProperties: false
            required:
                - type
                - tournamentId
                - scope
                - serverTime
                - deltas
            properties:
                type:
                    type: string
                    enum:
                        - ranking.delta
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                scope:
                    $ref: "#/components/schemas/RankingScope"
                matchday:
                    type: integer
                    minimum: 1
                serverTime:
                    type: string
                    format: date-time
                deltas:
                    type: array
                    items:
                        $ref: "#/components/schemas/RankingDelta"
                headsupRound:
                    $ref: "#/components/schemas/HeadsUpRoundSummary"
        MatchEventUpdate:
            type: object
            additionalProperties: false
            required:
                - type
                - matchEvent
            properties:
                type:
                    type: string
                    enum:
                        - match.event
                matchEvent:
                    $ref: "#/components/schemas/MatchEvent"
        MatchUpdatedEvent:
            type: object
            additionalProperties: false
            required:
                - type
                - match
            properties:
                type:
                    type: string
                    enum:
                        - match.updated
                match:
                    $ref: "#/components/schemas/Match"
        ResultsUpdatedEvent:
            type: object
            additionalProperties: false
            required:
