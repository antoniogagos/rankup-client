                - name
                - status
                - supportedSportIds
                - supportedModalities
                - capabilities
            properties:
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                name:
                    type: string
                    description: Localized display name (Accept-Language).
                    example: ScorePrediction
                shortName:
                    type: string
                    description: Optional short label.
                    example: Predictions
                description:
                    type: string
                    description: Localized description for UI.
                status:
                    $ref: "#/components/schemas/GameModeStatus"
                supportedSportIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/SportId"
                    example:
                        - football
                supportedModalities:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentModality"
                    example:
                        - matchday
                        - season
                supportedFormats:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentFormatId"
                    default:
                        - league
                defaultRulesetId:
                    $ref: "#/components/schemas/RulesetId"
                capabilities:
                    $ref: "#/components/schemas/GameModeCapabilities"
                tournamentRulesetConfigSchema:
                    $ref: "#/components/schemas/JsonSchemaObject"
        GameModeCapabilities:
            type: object
            additionalProperties: false
            required:
                - submissionModel
                - supportsLiveUpdates
                - supportsNegativePoints
            properties:
                submissionModel:
                    type: string
                    description: |
                        High-level interaction model used by clients.
                        Prefer stable identifiers (do not localize).
                    examples:
                        - perMatchPrediction
                        - perMatchdayDraft
                supportsLiveUpdates:
                    type: boolean
                    description: Whether live match events can change outcomes/points during play.
                supportsNegativePoints:
                    type: boolean
                    description: Whether scoring can be negative (penalties).
                supportsEditsBeforeLock:
                    type: boolean
                    description: Whether submissions can be edited before lock.
                lockGranularity:
                    type: string
                    description: What is locked (match, matchday, tournament).
                    examples:
                        - match
                        - matchday
        GameModeList:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/GameMode"
        RulesetStatus:
            type: string
            description: Ruleset lifecycle status.
            enum:
                - active
                - deprecated
                - retired
        RulesetSummary:
            type: object
            additionalProperties: false
            required:
                - rulesetId
                - gameModeId
                - sportId
                - name
                - status
                - isRankedEligible
                - version
            properties:
                rulesetId:
                    $ref: "#/components/schemas/RulesetId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                sportId:
                    $ref: "#/components/schemas/SportId"
                name:
                    type: string
                    description: Localized display name.
                description:
                    type: string
                status:
                    $ref: "#/components/schemas/RulesetStatus"
                isRankedEligible:
                    type: boolean
                    description:
                        If true, tournaments using this ruleset may count for
                        ranked/verified progression (subject to tournament verification).
                version:
                    type: string
                    description: Semantic or monotonic version identifier.
                    example: 1.0.0
                publishedAt:
                    type: string
                    format: date-time
        Ruleset:
            allOf:
                - $ref: "#/components/schemas/RulesetSummary"
                - type: object
                  additionalProperties: false
                  required:
                      - defaultConfig
                      - configSchema
                      - sections
                  properties:
                      defaultConfig:
                          $ref: "#/components/schemas/RulesetConfig"
                      configSchema:
                          $ref: "#/components/schemas/JsonSchemaObject"
                      sections:
                          type: array
                          description: >
                              Localized rules text for UI ("Rules" tab). Keep it declarative
                              and short.
                          items:
                              $ref: "#/components/schemas/RulesSection"
                      scoringModel:
                          type: string
                          description: Stable identifier for the scoring algorithm family.
                          examples:
                              - scorePrediction_v1
                      audit:
                          type: object
                          additionalProperties: false
                          properties:
                              createdAt:
                                  type: string
                                  format: date-time
                              createdBy:
                                  type: string
                                  description: Staff/system identifier (if applicable).
        RulesetPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/RulesetSummary"
                nextCursor:
                    type: string
        JsonSchemaObject:
            type: object
            description: >
                JSON Schema object (draft 2020-12). Used to describe/validate advanced
                ruleset configuration.

                This is metadata for clients; servers remain authoritative in validation.
            additionalProperties: true
        RulesetConfig:
            description: >
                Ruleset configuration payload. Shape depends on the underlying
                gameModeId/scoringModel.

                For forward compatibility, Rankup supports:

                - strongly-typed configs for known game modes

                - a generic object for future modes
            anyOf:
                - $ref: "#/components/schemas/ScorePredictionRulesetConfig"
                - $ref: "#/components/schemas/GenericRulesetConfig"
        GenericRulesetConfig:
            type: object
            description: Generic config placeholder for future game modes (extensible).
            additionalProperties: true
        ScorePredictionResultScope:
            type: string
            description: >
                Which match result is used to score predictions.

                - regular: regulation time only (e.g., 90 minutes in football).
                - extra_time: regulation + extra time when played (penalty shootout excluded).

                If extra time is not applicable for a competition, `extra_time` behaves
                the same as `regular`.
            enum:
                - regular
                - extra_time
        ScorePredictionRulesetConfig:
            type: object
            additionalProperties: false
            required:
                - lockPolicy
                - scoring
                - tieBreakers
            properties:
                resultScope:
                    $ref: "#/components/schemas/ScorePredictionResultScope"
                    default: extra_time
                    description: >
                        Tournament-scoped override. Controls whether predictions are
                        scored on regulation-only or regulation+extra-time results.
                lockPolicy:
                    $ref: "#/components/schemas/ScorePredictionLockPolicy"
                scoring:
                    $ref: "#/components/schemas/ScorePredictionScoring"
                tieBreakers:
                    type: array
                    description: Ordered tie-breakers applied when total points are equal.
                    items:
                        $ref: "#/components/schemas/RankingTieBreaker"
                allowNegativePoints:
                    type: boolean
                    default: true
                maxGoalsPerTeam:
                    type: integer
                    minimum: 0
                    default: 20
                    description: Optional validation cap for predicted scores (UX guardrail).
        ScorePredictionLockPolicyType:
            type: string
            enum:
                - kickoff
                - kickoffWithGrace
                - manual
        ScorePredictionLockPolicy:
            type: object
            additionalProperties: false
            required:
                - type
            properties:
                type:
                    $ref: "#/components/schemas/ScorePredictionLockPolicyType"
                graceSeconds:
                    type: integer
                    minimum: 0
                    maximum: 900
                    description: >
                        Only valid when type=kickoffWithGrace.

                        Recommended to keep small (e.g., 30–120s) to reduce unfair advantage.
                manualLockEnabled:
                    type: boolean
                    description: |
                        Only relevant when type=manual.
                        If true, admins can lock earlier (e.g., tournament rule).
        ScorePredictionScoring:
            type: object
            additionalProperties: false
            required:
                - correctOutcome
                - exactScore
                - exactGoalsOneTeam
                - wrongGoalsBothTeamsNonDrawPenalty
            properties:
                correctOutcome:
                    type: integer
                    description: Points for correct 1X2 (winner/draw).
                    example: 8
                exactScore:
                    type: integer
                    description: Points for exact scoreline.
                    example: 6
                exactGoalsOneTeam:
                    type: integer
                    description: Points for predicting the exact goals of one team (home or away).
                    example: 2
                wrongGoalsBothTeamsNonDrawPenalty:
                    type: integer
                    description: Penalty when both goal predictions are wrong in non-draw matches.
                    example: -2
                bonusRules:
                    type: array
                    description: Optional bonus/penalty rules (e.g., derby bonuses, featured match).
                    items:
                        $ref: "#/components/schemas/ScorePredictionBonusRule"
        ScorePredictionBonusRule:
            type: object
            additionalProperties: true
            description: >
                Extensible bonus rule. Keep as an open object until product rules are
                finalized.

                Examples: derbyBonus, featuredMatchMultiplier, streakBonus.
            properties:
                type:
                    type: string
                    examples:
                        - derbyBonus
                        - featuredMatchMultiplier
                value:
                    type: integer
                    description: Points or multiplier basis (interpretation depends on type).
        RankingTieBreaker:
            type: string
            description: |
                Tie-breaker strategy identifiers (ordered).
                Avoid tying to UI labels; keep stable ids.
            enum:
                - mostExactScores
                - mostCorrectOutcomes
                - mostExactGoalsOneTeam
                - earliestSubmission
                - random
        UnreadCount:
            type: object
            additionalProperties: false
            required:
                - count
            properties:
                count:
                    type: integer
                    minimum: 0
        MyTournamentInviteInclude:
            type: string
            enum:
                - tournamentPreview
        MyTournamentInviteSort:
            type: string
            enum:
                - newest
                - oldest
                - statusThenNewest
        MyTournamentInvite:
            description: Recipient-side invite view, optionally with tournament preview.
            allOf:
                - $ref: "#/components/schemas/TournamentInvite"
                - type: object
                  additionalProperties: false
                  properties:
                      seenAt:
                          type: string
                          format: date-time
                      hiddenAt:
                          type: string
                          format: date-time
                      tournamentPreview:
                          $ref: "#/components/schemas/TournamentPreview"
        MyTournamentInvitePage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/MyTournamentInvite"
                nextCursor:
                    type: string
        AcceptTournamentInviteRequest:
            type: object
            additionalProperties: false
            properties:
                acceptTournamentRules:
                    type: boolean
                    description: Optional explicit acceptance flag (server policy dependent).
                clientContext:
                    type: object
                    additionalProperties: true
                    description: Optional attribution/deep-link context.
        AcceptTournamentInviteResult:
            type: object
            additionalProperties: false
            required:
                - invite
                - join
            properties:
                invite:
                    $ref: "#/components/schemas/MyTournamentInvite"
                join:
                    $ref: "#/components/schemas/JoinByInvitationCodeResult"
        DeclineTournamentInviteRequest:
            type: object
            additionalProperties: false
            properties:
                reason:
                    type: string
                    maxLength: 200
                    description: Optional user-provided reason (not shown to inviter by default).
                clientContext:
                    type: object
                    additionalProperties: true
        InvitationCodeStatus:
            type: string
            description: Invitation code lifecycle state.
            enum:
                - active
                - revoked
                - expired
        InvitationCode:
            type: object
            additionalProperties: false
            required:
                - code
                - tournamentId
                - status
                - createdAt
            properties:
                code:
                    type: string
                    minLength: 6
                    maxLength: 32
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                status:
                    $ref: "#/components/schemas/InvitationCodeStatus"
                createdAt:
                    type: string
                    format: date-time
                createdByUserId:
                    type: string
                    description: Optional creator user id (when created by a user/admin).
                label:
                    type: string
                    maxLength: 60
                    description: Optional human label (e.g., "Family WhatsApp").
                expiresAt:
                    type: string
                    format: date-time
                revokedAt:
                    type: string
                    format: date-time
                maxUses:
                    type: integer
                    minimum: 1
                    description: Optional cap on uses.
                useCount:
                    type: integer
                    minimum: 0
                    description: Server-tracked number of successful joins using this code.
        InvitationCodePage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/InvitationCode"
                nextCursor:
                    type: string
        CreateInvitationCodeRequest:
            type: object
            additionalProperties: false
            description: |
                Creates a new code and optionally revokes existing active codes.
            properties:
                revokeExisting:
                    type: boolean
                    default: true
                    description: If true, revoke all active codes for the tournament.
                expiresAt:
                    type: string
                    format: date-time
                    description: Optional expiration timestamp.
                maxUses:
                    type: integer
                    minimum: 1
                    description: Optional max uses cap.
                label:
                    type: string
                    maxLength: 60
                reason:
                    type: string
                    maxLength: 200
                    description: Optional audit reason.
        InvitationCodeJoinNotAllowedReason:
            type: string
            enum:
                - codeRevoked
                - codeExpired
                - tournamentLocked
                - joinClosed
                - tournamentFull
                - tournamentArchived
                - tournamentCancelled
                - alreadyMember
        InvitationCodeResolution:
            type: object
            additionalProperties: false
            required:
                - code
                - codeStatus
                - joinable
                - tournament
            properties:
                code:
                    type: string
                codeStatus:
                    $ref: "#/components/schemas/InvitationCodeStatus"
                joinable:
                    type: boolean
                    description: Whether the viewer can join right now (subject to authentication).
                joinNotAllowedReason:
                    $ref: "#/components/schemas/InvitationCodeJoinNotAllowedReason"
                alreadyMember:
                    type: boolean
                    description:
                        Present when Authorization is provided; indicates viewer is already
                        a member.
                tournament:
                    $ref: "#/components/schemas/TournamentPreview"
        JoinByInvitationCodeRequest:
            type: object
            additionalProperties: false
            description: Optional join payload (reserved for future policy gates).
            properties:
                acceptTournamentRules:
                    type: boolean
                    description: >
                        Optional explicit acceptance flag (some jurisdictions/products like
                        explicit confirmations).

                        Server may ignore if not required.
                clientContext:
                    type: object
                    additionalProperties: true
                    description: Optional client hints (campaign tracking, deep-link context).
        JoinByInvitationCodeResult:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - joined
                - membership
                - tournament
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                joined:
                    type: boolean
                    description:
                        True if the user joined as a result of this request; false if
                        already a member.
                membership:
                    $ref: "#/components/schemas/MyMembershipSummary"
                tournament:
                    $ref: "#/components/schemas/TournamentSummary"
        NotificationId:
            type: string
            description: Notification identifier.
            example: ntf_01J8W0K7E2ZQZ6P0M4NQW2Y7AF
        FeedItemId:
            type: string
            description: Feed item identifier.
            example: fed_01J8W0K7E2ZQZ6P0M4NQW2Y7AH
        NotificationTopic:
            type: string
            description: High-level notification category (for filtering + preferences).
            enum:
                - match
                - ranking
                - tournament
                - social
                - chat
                - recap
                - achievement
                - system
        FeedTopic:
            type: string
            description: High-level feed category.
            enum:
                - match
                - ranking
                - tournament
                - social
                - recap
                - achievement
                - system
        NotificationType:
            type: string
            description: >
                Stable notification type id (open set). New types can be introduced
                without breaking clients.
            examples:
                - match.goal
                - match.statusChanged
                - ranking.changed
                - tournament.inviteReceived
                - tournament.ended
                - recap.available
                - achievement.unlocked
                - social.friendRequestReceived
                - chat.mention
        FeedItemType:
            type: string
            description: Stable feed item type id (open set).
            examples:
                - match.goal
                - ranking.delta
                - tournament.joined
                - tournament.ended
                - recap.available
                - achievement.unlocked
                - social.friendJoined
        NotificationPriority:
            type: string
            description: Used to decide push eligibility and UI prominence.
            enum:
                - low
                - normal
                - high
                - critical
            default: normal
        NotificationStatusFilter:
            type: string
            enum:
                - any
                - unread
                - read
                - dismissed
            description: Filter for notification inbox.
        NotificationInclude:
            type: string
            enum:
                - payload
        NotificationSort:
            type: string
            enum:
                - newest
                - oldest
            default: newest
        FeedInclude:
            type: string
            enum:
                - payload
        FeedSort:
            type: string
            enum:
                - newest
                - oldest
            default: newest
        NotificationAction:
            type: object
            additionalProperties: false
            required:
                - actionId
                - label
            properties:
                actionId:
                    type: string
                    description: Stable action id (client uses it for UI ordering/analytics).
                    examples:
                        - open
                        - viewRanking
                        - viewMatchday
                        - acceptInvite
                label:
                    type: string
                    description: Localized label to display.
                deepLinkUrl:
                    type: string
                    format: uri
                    description: Deep link to open in app.
                http:
                    type: object
                    additionalProperties: false
                    description:
                        Optional HTTP action (rare; only if you want "one-tap actions" via
                        API).
                    properties:
                        method:
                            type: string
                            enum:
                                - POST
                                - PUT
                                - PATCH
                                - DELETE
                        path:
                            type: string
                            description: Relative API path.
                        body:
                            type: object
                            additionalProperties: true
        NotificationContext:
            type: object
            additionalProperties: false
            description: Context references for deep linking and analytics.
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                matchId:
                    $ref: "#/components/schemas/MatchId"
                competitionId:
                    type: string
                recapId:
                    $ref: "#/components/schemas/RecapId"
                inviteId:
                    type: string
                friendRequestId:
                    type: string
                actorUserId:
                    type: string
        Notification:
            type: object
            additionalProperties: false
            required:
                - notificationId
                - topic
                - notificationType
                - createdAt
            properties:
                notificationId:
                    $ref: "#/components/schemas/NotificationId"
                topic:
                    $ref: "#/components/schemas/NotificationTopic"
                notificationType:
                    $ref: "#/components/schemas/NotificationType"
                priority:
                    $ref: "#/components/schemas/NotificationPriority"
                title:
                    type: string
                    description: Localized title.
                body:
                    type: string
                    description: Localized body.
                deepLinkUrl:
                    type: string
                    format: uri
                actions:
                    type: array
                    items:
                        $ref: "#/components/schemas/NotificationAction"
                actor:
                    $ref: "#/components/schemas/MeSummary"
                context:
                    $ref: "#/components/schemas/NotificationContext"
                payload:
                    type: object
                    additionalProperties: true
                    description: Optional type-specific payload (only when include=payload).
                createdAt:
                    type: string
                    format: date-time
                seenAt:
                    type: string
                    format: date-time
                readAt:
                    type: string
                    format: date-time
                dismissedAt:
                    type: string
                    format: date-time
        NotificationPage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/Notification"
                nextCursor:
                    type: string
        NotificationUnreadCounts:
            type: object
            additionalProperties: false
            required:
                - total
            properties:
                total:
                    type: integer
                    minimum: 0
                byTopic:
                    type: object
                    additionalProperties:
                        type: integer
                    description: Optional breakdown by topic key.
        NotificationBatchAction:
            type: string
            enum:
                - markSeen
                - markRead
                - dismiss
        NotificationBatchActionRequest:
            type: object
            additionalProperties: false
            required:
                - action
            properties:
                action:
                    $ref: "#/components/schemas/NotificationBatchAction"
                notificationIds:
                    type: array
                    minItems: 1
                    maxItems: 500
                    items:
                        $ref: "#/components/schemas/NotificationId"
                    description: Target notification ids.
                untilCreatedAt:
                    type: string
                    format: date-time
                    description: Optional bulk scope (server-defined behavior).
        NotificationBatchActionResult:
            type: object
            additionalProperties: false
            required:
                - appliedIds
                - notFoundIds
                - serverTime
            properties:
                serverTime:
                    type: string
                    format: date-time
                appliedIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/NotificationId"
                notFoundIds:
                    type: array
                    items:
                        $ref: "#/components/schemas/NotificationId"
                unreadCounts:
                    $ref: "#/components/schemas/NotificationUnreadCounts"
        FeedContext:
            type: object
            additionalProperties: false
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                matchday:
                    type: integer
                    minimum: 1
                matchId:
                    $ref: "#/components/schemas/MatchId"
                recapId:
                    $ref: "#/components/schemas/RecapId"
                actorUserId:
                    type: string
        FeedItem:
            type: object
            additionalProperties: false
            required:
                - feedItemId
                - topic
                - feedItemType
                - createdAt
            properties:
                feedItemId:
                    $ref: "#/components/schemas/FeedItemId"
                topic:
                    $ref: "#/components/schemas/FeedTopic"
                feedItemType:
                    $ref: "#/components/schemas/FeedItemType"
                title:
                    type: string
                    description: Localized title.
                body:
                    type: string
                    description: Localized body.
                deepLinkUrl:
                    type: string
                    format: uri
                actor:
                    $ref: "#/components/schemas/MeSummary"
                context:
                    $ref: "#/components/schemas/FeedContext"
                payload:
                    type: object
                    additionalProperties: true
                createdAt:
                    type: string
                    format: date-time
        FeedPage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/FeedItem"
                nextCursor:
                    type: string
                prevCursor:
                    type: string
        FeedReadCursor:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - lastSeenAt
                - unreadCount
            properties:
                serverTime:
                    type: string
                    format: date-time
                lastSeenAt:
                    type: string
                    format: date-time
                lastSeenFeedItemId:
                    $ref: "#/components/schemas/FeedItemId"
                unreadCount:
                    type: integer
                    minimum: 0
        UpdateFeedReadCursorRequest:
            type: object
            additionalProperties: false
            required:
                - lastSeenAt
            properties:
                lastSeenAt:
                    type: string
                    format: date-time
                    description: Server uses this as a cursor; server time is authoritative.
                lastSeenFeedItemId:
                    $ref: "#/components/schemas/FeedItemId"
        MeUpdatesTopic:
            type: string
            enum:
                - notifications
                - feed
        MeUpdateEvent:
            oneOf:
                - $ref: "#/components/schemas/NotificationCreatedEvent"
                - $ref: "#/components/schemas/FeedItemCreatedEvent"
            discriminator:
                propertyName: type
                mapping:
                    notification.created: "#/components/schemas/NotificationCreatedEvent"
                    feed.item.created: "#/components/schemas/FeedItemCreatedEvent"
        NotificationCreatedEvent:
            type: object
            additionalProperties: false
            required:
                - type
                - serverTime
                - notification
            properties:
                type:
                    type: string
                    enum:
                        - notification.created
                serverTime:
                    type: string
                    format: date-time
                notification:
                    $ref: "#/components/schemas/Notification"
        FeedItemCreatedEvent:
            type: object
            additionalProperties: false
            required:
                - type
                - serverTime
                - item
            properties:
                type:
                    type: string
                    enum:
                        - feed.item.created
                serverTime:
                    type: string
                    format: date-time
                item:
                    $ref: "#/components/schemas/FeedItem"
        MeUpdatePage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - events
                - nextCursor
            properties:
                serverTime:
                    type: string
                    format: date-time
                events:
                    type: array
                    items:
                        $ref: "#/components/schemas/MeUpdateEvent"
                nextCursor:
                    type: string
        Me:
            type: object
            additionalProperties: false
            required:
                - userId
                - username
                - email
                - emailVerified
                - createdAt
            properties:
                userId:
                    type: string
                    description: Stable user identifier.
                    example: usr_01HR9D9Z3N7J2K1M8QW8X0Z4Y1
                username:
                    $ref: "#/components/schemas/Username"
                pictureUrl:
                    type: string
                    format: uri
                    description: Optional avatar URL.
                email:
                    $ref: "#/components/schemas/EmailAddress"
                emailVerified:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
        UpdateMeRequest:
            type: object
            additionalProperties: false
            properties:
                username:
                    $ref: "#/components/schemas/Username"
                pictureUrl:
                    type: string
                    format: uri
                bio:
                    type: string
                    maxLength: 280
        ChangePasswordRequest:
            type: object
            additionalProperties: false
            required:
                - newPassword
            properties:
                currentPassword:
