                              - feed
                - name: sinceCursor
                  in: query
                  required: false
                  schema:
                      type: string
                - name: waitSeconds
                  in: query
                  required: false
                  schema:
                      type: integer
                      minimum: 0
                      maximum: 30
                      default: 0
                - name: limit
                  in: query
                  required: false
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 500
                      default: 100
            responses:
