                    type: string
                    format: date-time
                expiresAt:
                    type: string
                    format: date-time
                    description: Optional expiration for the confirmation step.
        ConfirmRegistrationRequest:
            type: object
            additionalProperties: false
            required:
                - email
                - code
            properties:
                email:
                    $ref: "#/components/schemas/EmailAddress"
                code:
                    type: string
                    minLength: 4
                    maxLength: 64
                    description: Confirmation code sent via email.
        ResendConfirmationRequest:
            type: object
            additionalProperties: false
            required:
                - email
            properties:
                email:
                    $ref: "#/components/schemas/EmailAddress"
        CreateSessionRequest:
            type: object
            additionalProperties: false
            required:
                - email
                - password
            properties:
                email:
                    $ref: "#/components/schemas/EmailAddress"
                password:
                    $ref: "#/components/schemas/Password"
        RefreshSessionRequest:
            type: object
            additionalProperties: false
            required:
                - refreshToken
            properties:
                refreshToken:
                    type: string
                    minLength: 16
        RequestPasswordResetRequest:
            type: object
            additionalProperties: false
            required:
                - email
            properties:
                email:
                    $ref: "#/components/schemas/EmailAddress"
        ConfirmPasswordResetRequest:
            type: object
            additionalProperties: false
            required:
                - email
                - code
                - newPassword
            properties:
                email:
                    $ref: "#/components/schemas/EmailAddress"
                code:
                    type: string
                    minLength: 4
                    maxLength: 64
                    description: Reset code/token delivered via email.
                newPassword:
                    $ref: "#/components/schemas/Password"
        AuthSession:
            type: object
            additionalProperties: false
            required:
                - accessToken
                - expiresAt
                - tokenType
                - user
            properties:
                accessToken:
                    type: string
                    minLength: 16
                refreshToken:
                    type: string
                    minLength: 16
                    description:
                        Optional if the server chooses not to issue refresh tokens in some
                        flows.
                idToken:
                    type: string
                    description: Optional OIDC id_token (if issued).
                tokenType:
                    type: string
                    enum:
                        - Bearer
                expiresAt:
                    type: string
                    format: date-time
                user:
                    $ref: "#/components/schemas/MeSummary"
        OAuthProvider:
            type: string
            description: OAuth provider identifier (extensible).
            examples:
                - google
                - apple
        OAuthGrantType:
            type: string
            enum:
                - authorization_code
                - id_token
        OAuthTokenRequest:
            oneOf:
                - $ref: "#/components/schemas/OAuthAuthorizationCodeGrant"
                - $ref: "#/components/schemas/OAuthIdTokenGrant"
            discriminator:
                propertyName: grantType
                mapping:
                    authorization_code: "#/components/schemas/OAuthAuthorizationCodeGrant"
                    id_token: "#/components/schemas/OAuthIdTokenGrant"
        OAuthAuthorizationCodeGrant:
            type: object
            additionalProperties: false
            required:
                - grantType
                - provider
                - code
                - redirectUri
            properties:
                grantType:
                    $ref: "#/components/schemas/OAuthGrantType"
                provider:
                    $ref: "#/components/schemas/OAuthProvider"
                code:
                    type: string
                    description: Authorization code from provider.
                redirectUri:
                    type: string
                    format: uri
                codeVerifier:
                    type: string
                    description: PKCE code verifier (required when codeChallenge was used).
        OAuthIdTokenGrant:
            type: object
            additionalProperties: false
            required:
                - grantType
                - provider
                - idToken
            properties:
                grantType:
                    $ref: "#/components/schemas/OAuthGrantType"
                provider:
                    $ref: "#/components/schemas/OAuthProvider"
                idToken:
                    type: string
                    description: Provider id_token acquired via native SDK.
                nonce:
                    type: string
                    description: Optional nonce for additional validation.
        OAuthLinkRequest:
            description: >
                Same shapes as token exchange, but links the provider to the current
                account.
            oneOf:
                - $ref: "#/components/schemas/OAuthAuthorizationCodeGrant"
                - $ref: "#/components/schemas/OAuthIdTokenGrant"
            discriminator:
                propertyName: grantType
                mapping:
                    authorization_code: "#/components/schemas/OAuthAuthorizationCodeGrant"
                    id_token: "#/components/schemas/OAuthIdTokenGrant"
        OAuthLink:
            type: object
            additionalProperties: false
            required:
                - provider
                - linkedAt
            properties:
                provider:
                    $ref: "#/components/schemas/OAuthProvider"
                linkedAt:
                    type: string
                    format: date-time
        OAuthLinkList:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/OAuthLink"
        ChatMessageId:
            type: string
            description: Chat message identifier.
            example: msg_01J8W0K7E2ZQZ6P0M4NQW2Y7AA
        ChatPageDirection:
            type: string
            enum:
                - backward
                - forward
            default: backward
        TournamentChatPermission:
            type: string
            description: Effective capabilities for the current user in this tournament chat.
            enum:
                - chat.read
                - chat.send
                - chat.edit.own
                - chat.delete.own
                - chat.moderate.delete
                - chat.moderate.mute
                - chat.moderate.pin
                - chat.moderate.settings
        TournamentChatSettings:
            type: object
            additionalProperties: false
            required:
                - enabled
                - slowModeSeconds
                - maxMessageLength
            properties:
                enabled:
                    type: boolean
                    description: Whether chat is enabled for the tournament.
                slowModeSeconds:
                    type: integer
                    minimum: 0
                    maximum: 3600
                    description: |
                        Minimum seconds between messages per user.
                        0 disables slow mode.
                maxMessageLength:
                    type: integer
                    minimum: 1
                    maximum: 2000
                    description: Maximum allowed message length.
                allowLinks:
                    type: boolean
                    default: true
                    description: If false, server rejects messages containing URLs.
                allowImages:
                    type: boolean
                    default: false
                    description: Future. If true, messages may include attachments.
                profanityFilterLevel:
                    type: string
                    description: Server-defined filter level (family-friendly posture).
                    enum:
                        - off
                        - low
                        - medium
                        - high
                    default: medium
        TournamentChatState:
            type: object
            additionalProperties: false
            required:
                - isMuted
                - canSend
            properties:
                isMuted:
                    type: boolean
                mutedUntil:
                    type: string
                    format: date-time
                canSend:
                    type: boolean
                cannotSendReason:
                    type: string
                    description: Stable reason ids for UI.
                    examples:
                        - chatDisabled
                        - muted
                        - tournamentArchived
                        - notMember
                nextAllowedSendAt:
                    type: string
                    format: date-time
                    description: Helpful when slow mode is enabled.
        TournamentChat:
            type: object
            additionalProperties: false
            required:
                - tournamentId
                - serverTime
                - settings
                - myState
                - myPermissions
            properties:
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                serverTime:
                    type: string
                    format: date-time
                settings:
                    $ref: "#/components/schemas/TournamentChatSettings"
                myState:
                    $ref: "#/components/schemas/TournamentChatState"
                myPermissions:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentChatPermission"
        UpdateTournamentChatSettingsRequest:
            type: object
            additionalProperties: false
            properties:
                enabled:
                    type: boolean
                slowModeSeconds:
                    type: integer
                    minimum: 0
                    maximum: 3600
                maxMessageLength:
                    type: integer
                    minimum: 1
                    maximum: 2000
                allowLinks:
                    type: boolean
                allowImages:
                    type: boolean
                profanityFilterLevel:
                    type: string
                    enum:
                        - off
                        - low
                        - medium
                        - high
                reason:
                    type: string
                    maxLength: 200
                    description: Optional audit reason.
        ChatMessageType:
            type: string
            enum:
                - text
                - system
        ChatSystemEventType:
            type: string
            enum:
                - memberJoined
                - memberLeft
                - tournamentLocked
                - tournamentUnlocked
                - matchdayStarted
                - matchdayFinished
        ChatSystemEvent:
            type: object
            additionalProperties: false
            required:
                - type
            properties:
                type:
                    $ref: "#/components/schemas/ChatSystemEventType"
                user:
                    $ref: "#/components/schemas/MeSummary"
                matchday:
                    type: integer
                    minimum: 1
                payload:
                    type: object
                    additionalProperties: true
                    description: Optional event payload.
        ChatReactionId:
            type: string
            description: Canonical reaction id (URL-safe).
            pattern: ^[a-z0-9_]{1,32}$
            example: thumbs_up
        ChatReaction:
            type: object
            additionalProperties: false
            required:
                - reactionId
                - count
                - meReacted
            properties:
                reactionId:
                    $ref: "#/components/schemas/ChatReactionId"
                count:
                    type: integer
                    minimum: 0
                meReacted:
                    type: boolean
        ChatMessage:
            type: object
            additionalProperties: false
            required:
                - messageId
                - tournamentId
                - type
                - createdAt
            properties:
                messageId:
                    $ref: "#/components/schemas/ChatMessageId"
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                type:
                    $ref: "#/components/schemas/ChatMessageType"
                sender:
                    $ref: "#/components/schemas/MeSummary"
                text:
                    type: string
                    nullable: true
                    description: Null when deleted/tombstoned or for some system messages.
                systemEvent:
                    $ref: "#/components/schemas/ChatSystemEvent"
                replyToMessageId:
                    $ref: "#/components/schemas/ChatMessageId"
                mentions:
                    type: array
                    description: Mentioned user ids (optional; server may compute).
                    items:
                        type: string
                createdAt:
                    type: string
                    format: date-time
                editedAt:
                    type: string
                    format: date-time
                deletedAt:
                    type: string
                    format: date-time
                deletedBy:
                    $ref: "#/components/schemas/MeSummary"
                deleteReason:
                    type: string
                    description: Stable reason id (moderation/audit).
                    examples:
                        - removedByModerator
                        - retractedByAuthor
                        - profanity
                pinnedAt:
                    type: string
                    format: date-time
                pinnedBy:
                    $ref: "#/components/schemas/MeSummary"
                reactions:
                    type: array
                    items:
                        $ref: "#/components/schemas/ChatReaction"
                clientMessageId:
                    type: string
                    description: Optional client-side dedupe id.
        ChatMessagePage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/ChatMessage"
                nextCursor:
                    type: string
        SendChatMessageRequest:
            type: object
            additionalProperties: false
            required:
                - type
