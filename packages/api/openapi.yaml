    /me/feed:
        get:
            tags:
                - live.feed
            operationId: listMyFeed
            summary: List my activity feed
            description: >
                Returns the current user's personal activity feed.


                Critical product constraint:

                - This is NOT a global stranger feed. It is a **personal** feed derived from:
                  - tournaments you are in
                  - friends/following (optional)
                  - Rankup official events you joined/follow
                  - system milestones (recaps, achievements)

                The feed is designed to make the app feel "alive" during live matches without being spammy.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: topics
                  in: query
                  required: false
                  description: Filter feed items by topic.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/FeedTopic"
                - name: tournamentId
                  in: query
                  required: false
                  description: Filter feed items by tournament context.
                  schema:
                      $ref: "#/components/schemas/TournamentId"
                - name: sinceCursor
                  in: query
                  required: false
                  description: Opaque cursor for incremental loading (newer items).
                  schema:
                      type: string
                - name: untilCursor
                  in: query
                  required: false
                  description: Opaque cursor for pagination (older items).
                  schema:
                      type: string
                - name: include
                  in: query
                  required: false
                  description: Optional expansions (keep light by default).
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/FeedInclude"
                - name: sort
