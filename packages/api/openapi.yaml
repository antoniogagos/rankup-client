                - tournaments.invites
            operationId: listTournamentInvites
            summary: List tournament invites (admin-only)
            description: >
                Lists direct invites created for the tournament.


                Anti-spam posture:

                - Admin/owner-only by default.

                - If Rankup later allows "any member can invite", enforce per-user rate limits and recipient controls.


                Privacy:

                - Membership is required; do not expose invites for non-members.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
