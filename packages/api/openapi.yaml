                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MyTournamentInvite"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
    "/tournaments/{tournamentId}/invitation-codes":
        get:
            tags:
                - tournaments.invitationCodes
            operationId: listTournamentInvitationCodes
            summary: List invitation codes for a tournament (admin-only)
            description: >
                Lists invitation codes for a tournament.


                Security & abuse posture:

                - Admin/owner only by default.

                - Codes are sensitive join tokens; do not expose to non-authorized members unless the product explicitly decides so.


                Notes:

                - If Rankup later wants "any member can invite", switch authz policy server-side or add a separate
                  read-only endpoint that returns the *active code only* to members with invite permission.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
                - name: status
                  in: query
                  required: false
                  description: Filter by code status.
                  schema:
                      $ref: "#/components/schemas/InvitationCodeStatus"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Invitation codes page.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/InvitationCodePage"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/TournamentNotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
        post:
            tags:
                - tournaments.invitationCodes
            operationId: createTournamentInvitationCode
            summary: Create/rotate an invitation code (admin-only)
            description: >
                Creates a new invitation code for joining the tournament.


                Recommended default behavior:

                - `revokeExisting=true` to invalidate previous active codes (rotation).

                - Optional expiry/maxUses for special cases (e.g., limited drops).


                Idempotency:

                - Clients SHOULD provide `X-Idempotency-Key` to avoid accidental multiple codes on retry.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateInvitationCodeRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "201":
                    description: Invitation code created.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Location:
                            description: Canonical URL of the invitation code resource.
                            schema:
                                type: string
                                format: uri-reference
                            example: /invitation-codes/AB12CD34
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/InvitationCode"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/TournamentNotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    "/invitation-codes/{code}":
        get:
            tags:
                - tournaments.invitationCodes
            operationId: resolveInvitationCode
            summary: Resolve an invitation code (preview + joinability)
            description: >
                Resolves an invitation code to the minimal information needed for a join
                flow.


                Product rule: "No spectators"

                - This endpoint MUST NOT disclose tournament internals (ranking, chat history, other players' submissions).

                - It may return the same safe preview content as `/tournaments/{tournamentId}/preview`.


                Auth is optional:

                - Anonymous users can see the join screen preview (then login).

                - Authenticated users additionally get `alreadyMember` hint to avoid redundant join attempts.


                Anti-abuse:

                - Rate-limit and monitor brute-force attempts.

                - Codes SHOULD be high-entropy (server-generated).
            security:
                - {}
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InvitationCode"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description:
                        Invitation code resolved (exists). Joinability provided in response
                        body.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/InvitationCodeResolution"
                "404":
                    $ref: "#/components/responses/TournamentNotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    "/invitation-codes/{code}/members/me":
        put:
            tags:
                - tournaments.invitationCodes
            operationId: joinTournamentByInvitationCode
            summary: Join a tournament using an invitation code
            description: >
                Joins the tournament referenced by the invitation code.


                Idempotency:

                - PUT is idempotent: if the user is already a member, the server SHOULD return 200 with `joined=false`.


                Authorization:

                - Requires authentication.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/InvitationCode"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/JoinByInvitationCodeRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Join request processed (already a member or joined successfully).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/JoinByInvitationCodeResult"
                "201":
                    description: Joined successfully (optional first-join status code).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/JoinByInvitationCodeResult"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/TournamentNotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    /me/notifications:
        get:
            tags:
                - live.notifications
            operationId: listMyNotifications
            summary: List my notifications
            description: >
                Returns the current user's in-app notifications.


                Design goals:

                - "App viva": fast, frequently refreshed surface.

                - No spectator concept: notifications are strictly personalized to the authenticated user.

                - Supports multi-language via `Accept-Language` + `Content-Language`.


                Notes:

                - Prefer cursor pagination.

                - Use `include=payload` only when needed (heavier).
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/NotificationStatusFilter"
                - name: topics
                  in: query
                  required: false
                  description: Filter by notification topics.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/NotificationTopic"
                - name: types
                  in: query
                  required: false
                  description: Filter by notification types.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/NotificationType"
                - name: tournamentId
                  in: query
                  required: false
                  description: Filter notifications by tournament context.
                  schema:
                      $ref: "#/components/schemas/TournamentId"
                - name: since
                  in: query
                  required: false
                  description: Return notifications created at/after this time.
                  schema:
                      type: string
                      format: date-time
                - name: until
                  in: query
                  required: false
                  description: Return notifications created before this time.
                  schema:
                      type: string
                      format: date-time
                - name: include
                  in: query
                  required: false
                  description: Optional expansions (keep payload light by default).
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/NotificationInclude"
                  examples:
                      minimal:
                          value: []
                      withPayload:
                          value:
                              - payload
                - name: sort
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/NotificationSort"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Notification page.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/NotificationPage"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
