        UploadId:
            type: string
            description: Upload session identifier.
            example: upl_01J8W0K7E2ZQZ6P0M4NQW2Y7JA
        MediaId:
            type: string
            description: Media asset identifier.
            example: med_01J8W0K7E2ZQZ6P0M4NQW2Y7JB
        MediaPurpose:
            type: string
            description: >
                Intended purpose slot for the upload. Server enforces allowed purposes
                and required scope.


                Use dot-separated identifiers. This is an open set; server may introduce new purposes.
            pattern: ^[a-z0-9]+(\.[a-z0-9]+)*$
            examples:
                - user.avatar
                - tournament.cover
                - tournament.avatar
                - creator.avatar
                - creator.hero
                - verified.event.hero
                - verified.event.sponsorLogo
                - promotion.hero
                - report.attachment
        MediaVisibility:
            type: string
            description: Visibility for access control.
            enum:
                - public
                - unlisted
                - private
            default: public
        MediaKind:
            type: string
            description: Media kind. Start with images; expand later if needed.
            enum:
                - image
            default: image
        UploadStatus:
            type: string
            enum:
                - created
                - uploaded
                - completing
                - processing
                - completed
                - failed
                - expired
                - aborted
        MediaStatus:
            type: string
            enum:
                - processing
                - ready
                - rejected
                - failed
                - deleted
        ChecksumAlgorithm:
            type: string
            enum:
                - sha256
        Checksum:
            type: object
            additionalProperties: false
            required:
                - algorithm
                - value
            properties:
                algorithm:
                    $ref: "#/components/schemas/ChecksumAlgorithm"
                value:
                    type: string
                    description: Hex-encoded checksum.
                    pattern: ^[a-f0-9]{64}$
                    example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        MediaScope:
            type: object
            additionalProperties: false
            description: >
                Optional scope references. Certain purposes require a scope.


                Examples:

                - tournament.cover requires tournamentId (and tournament admin permission)

                - creator.hero requires creatorId (and creator manager permission)
            properties:
                userId:
                    type: string
                    description: Optional explicit userId (usually implied by /me).
                tournamentId:
                    $ref: "#/components/schemas/TournamentId"
                creatorId:
                    $ref: "#/components/schemas/CreatorId"
                verifiedEventId:
                    $ref: "#/components/schemas/VerifiedEventId"
                promotionId:
                    $ref: "#/components/schemas/PromotionId"
                reportId:
                    $ref: "#/components/schemas/ReportId"
        ImageHints:
            type: object
            additionalProperties: false
            properties:
                width:
                    type: integer
                    minimum: 1
                height:
                    type: integer
                    minimum: 1
        UploadConstraints:
            type: object
            additionalProperties: false
            description: Server-enforced constraints for this upload session.
            required:
                - maxSizeBytes
                - allowedContentTypes
            properties:
                maxSizeBytes:
                    type: integer
                    minimum: 1
                    example: 5242880
                allowedContentTypes:
                    type: array
                    items:
                        type: string
                    example:
                        - image/jpeg
                        - image/png
                        - image/webp
                recommendedAspectRatio:
                    type: string
                    description: Display hint (e.g., "1:1", "16:9").
                    example: 1:1
                minWidth:
                    type: integer
                    minimum: 1
                minHeight:
                    type: integer
                    minimum: 1
                maxWidth:
                    type: integer
                    minimum: 1
                maxHeight:
                    type: integer
                    minimum: 1
        UploadDestinationStrategy:
            type: string
            enum:
                - singlePut
                - multipartFormPost
            description: Strategy for direct-to-storage upload.
        UploadDestination:
            oneOf:
                - $ref: "#/components/schemas/UploadDestinationSinglePut"
                - $ref: "#/components/schemas/UploadDestinationMultipartFormPost"
            discriminator:
                propertyName: strategy
                mapping:
                    singlePut: "#/components/schemas/UploadDestinationSinglePut"
                    multipartFormPost: "#/components/schemas/UploadDestinationMultipartFormPost"
        UploadDestinationSinglePut:
            type: object
            additionalProperties: false
            required:
                - strategy
                - method
                - url
                - expiresAt
            properties:
                strategy:
                    $ref: "#/components/schemas/UploadDestinationStrategy"
                method:
                    type: string
                    enum:
                        - PUT
                url:
                    type: string
                    format: uri
                    description: Pre-signed PUT URL.
                requiredHeaders:
                    type: object
                    additionalProperties:
                        type: string
                    description: Headers the client MUST include when uploading (e.g., Content-Type).
                expiresAt:
                    type: string
                    format: date-time
        UploadDestinationMultipartFormPost:
            type: object
            additionalProperties: false
            required:
                - strategy
                - method
                - url
                - formFields
                - expiresAt
            properties:
                strategy:
                    $ref: "#/components/schemas/UploadDestinationStrategy"
                method:
                    type: string
                    enum:
                        - POST
                url:
                    type: string
                    format: uri
                    description: Storage form POST endpoint.
                formFields:
                    type: object
                    additionalProperties:
                        type: string
                    description: Form fields the client MUST send in multipart/form-data to upload.
                expiresAt:
                    type: string
                    format: date-time
        CreateUploadRequest:
            type: object
            additionalProperties: false
            required:
                - purpose
                - contentType
            properties:
                purpose:
                    $ref: "#/components/schemas/MediaPurpose"
                scope:
                    $ref: "#/components/schemas/MediaScope"
                visibility:
                    $ref: "#/components/schemas/MediaVisibility"
                kind:
                    $ref: "#/components/schemas/MediaKind"
                fileName:
                    type: string
                    maxLength: 255
                contentType:
                    type: string
                    description: MIME type (server validates).
                    example: image/jpeg
                sizeBytes:
                    type: integer
                    minimum: 1
                    description: Optional but recommended for server-side validation and policy.
                checksum:
                    $ref: "#/components/schemas/Checksum"
                imageHints:
                    $ref: "#/components/schemas/ImageHints"
                clientContext:
                    type: object
                    additionalProperties: true
                    description: Optional analytics/debug context (server may ignore).
        UploadSession:
            type: object
            additionalProperties: false
            required:
                - uploadId
                - status
                - purpose
                - createdAt
                - constraints
            properties:
                uploadId:
                    $ref: "#/components/schemas/UploadId"
                status:
                    $ref: "#/components/schemas/UploadStatus"
                purpose:
                    $ref: "#/components/schemas/MediaPurpose"
                scope:
                    $ref: "#/components/schemas/MediaScope"
                visibility:
                    $ref: "#/components/schemas/MediaVisibility"
                kind:
                    $ref: "#/components/schemas/MediaKind"
                constraints:
                    $ref: "#/components/schemas/UploadConstraints"
                destination:
                    $ref: "#/components/schemas/UploadDestination"
                createdAt:
                    type: string
                    format: date-time
                expiresAt:
                    type: string
                    format: date-time
                failureReason:
                    type: string
                    description: Localized explanation when status=failed/expired.
                mediaId:
                    $ref: "#/components/schemas/MediaId"
        ImageCrop:
            type: object
            additionalProperties: false
            description: |
                Normalized crop rectangle for server-side variant generation.
                Values are 0..1 relative to the original image.
            required:
                - x
                - y
                - width
                - height
            properties:
                x:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                y:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                width:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                height:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
        CompleteUploadRequest:
            type: object
            additionalProperties: false
            description: |
                Information required to finalize an upload.

                The server MUST validate that:
                - the object exists at the expected storage key
                - size/contentType constraints are met
                - checksum matches if provided
            properties:
                storage:
                    type: object
                    additionalProperties: false
                    properties:
                        etag:
                            type: string
                            description: Storage ETag (if applicable).
                        sizeBytes:
                            type: integer
                            minimum: 1
                        contentType:
                            type: string
                        checksum:
                            $ref: "#/components/schemas/Checksum"
                imageCrop:
                    $ref: "#/components/schemas/ImageCrop"
                makePrimary:
                    type: boolean
                    default: false
                    description: >
                        Optional hint: if this upload is intended to become the "active"
                        asset (e.g., user avatar),

                        client may set this to true, but the actual association happens in the owning resource endpoint

                        (e.g., PATCH /me).
                notes:
                    type: string
                    maxLength: 500
        MediaInclude:
            type: string
            enum:
                - variants
                - original
            description: Optional expansions.
        MediaModerationStatus:
            type: string
            enum:
                - notRequired
                - pending
                - approved
                - rejected
        MediaModeration:
            type: object
            additionalProperties: false
            required:
                - status
            properties:
