                    $ref: "#/components/schemas/VerifiedBranding"
                eligibility:
                    $ref: "#/components/schemas/VerifiedEligibility"
                schedule:
                    $ref: "#/components/schemas/VerifiedEventSchedule"
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
                description:
                    type: string
                    description: Localized long description (safe, pre-join).
                tournaments:
                    type: array
                    description: Optional embedded tournament previews.
                    items:
                        $ref: "#/components/schemas/VerifiedTournamentPreview"
                tags:
                    type: array
                    items:
                        type: string
        VerifiedEventSummary:
            type: object
            additionalProperties: false
            required:
                - eventId
                - status
                - branding
            properties:
                eventId:
                    $ref: "#/components/schemas/VerifiedEventId"
                status:
                    $ref: "#/components/schemas/VerifiedEventStatus"
                branding:
                    $ref: "#/components/schemas/VerifiedBranding"
                schedule:
                    $ref: "#/components/schemas/VerifiedEventSchedule"
                sportId:
                    $ref: "#/components/schemas/SportId"
                gameModeId:
                    $ref: "#/components/schemas/GameModeId"
        VerifiedEventPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/VerifiedEventSummary"
                nextCursor:
                    type: string
        VerifiedTournamentPreview:
            allOf:
                - $ref: "#/components/schemas/TournamentPreview"
                - type: object
                  additionalProperties: false
                  required:
                      - verified
                  properties:
                      verified:
                          type: boolean
                          enum:
                              - true
                      verifiedEventId:
                          $ref: "#/components/schemas/VerifiedEventId"
                      branding:
                          $ref: "#/components/schemas/VerifiedBranding"
                      eligibility:
                          $ref: "#/components/schemas/VerifiedEligibility"
                      joinInfo:
                          $ref: "#/components/schemas/VerifiedJoinInfo"
        VerifiedJoinInfo:
            type: object
            additionalProperties: false
            properties:
                joinOpensAt:
                    type: string
                    format: date-time
                joinClosesAt:
                    type: string
                    format: date-time
                capacity:
                    type: integer
                    minimum: 1
                currentPlayers:
                    type: integer
                    minimum: 0
                joinMethod:
                    type: string
                    description: Join mechanism (explicit; no spectator mode).
                    enum:
                        - oneTap
                        - invitationCode
                        - directInvite
                requiresAccount:
                    type: boolean
                    default: true
                eligibilitySummary:
                    type: string
                    description: Localized short eligibility summary.
        VerifiedTournamentSummary:
            type: object
            additionalProperties: false
            required:
                - tournament
                - status
            properties:
                tournament:
                    $ref: "#/components/schemas/VerifiedTournamentPreview"
                status:
                    $ref: "#/components/schemas/VerifiedTournamentStatus"
        VerifiedTournamentPage:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/VerifiedTournamentSummary"
                nextCursor:
                    type: string
        VerifiedHubSectionType:
            type: string
            enum:
                - hero
                - featuredEvents
                - recommended
                - trendingTournaments
                - upcomingThisWeek
                - seasonal
        VerifiedHubSection:
            type: object
            additionalProperties: false
            required:
                - sectionId
                - type
                - title
            properties:
                sectionId:
                    type: string
                    example: sec_hero
                type:
                    $ref: "#/components/schemas/VerifiedHubSectionType"
                title:
                    type: string
                    description: Localized title.
                subtitle:
                    type: string
                items:
                    type: array
                    description: Items may reference events or tournaments.
                    items:
                        $ref: "#/components/schemas/VerifiedHubItem"
        VerifiedHubItemType:
            type: string
            enum:
                - event
                - tournament
        VerifiedHubItem:
            type: object
            additionalProperties: false
            required:
                - type
            properties:
                type:
                    $ref: "#/components/schemas/VerifiedHubItemType"
                event:
                    $ref: "#/components/schemas/VerifiedEventSummary"
                tournament:
                    $ref: "#/components/schemas/VerifiedTournamentPreview"
        VerifiedHub:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - sections
            properties:
                serverTime:
                    type: string
                    format: date-time
                sections:
                    type: array
                    items:
                        $ref: "#/components/schemas/VerifiedHubSection"
    requestBodies: {}
