                    minimum: 0
                    maximum: 1
                progressByRequirement:
                    type: array
                    description: Optional per-requirement progress for transparency.
                    items:
                        type: object
                        additionalProperties: false
                        required:
                            - metricId
                            - current
                            - target
                        properties:
                            metricId:
                                type: string
                            current:
                                type: number
                            target:
                                type: number
                            progress:
                                type: number
                                minimum: 0
                                maximum: 1
                unlockedAt:
                    type: string
                    format: date-time
                unlockContext:
                    $ref: "#/components/schemas/AchievementUnlockContext"
                eligibilitySummary:
                    type: string
        AchievementProgressPage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
