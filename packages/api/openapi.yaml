                  in: query
                  required: false
                  description: Custom window start (overrides timeframe when provided).
                  schema:
                      type: string
                      format: date-time
                - name: to
                  in: query
                  required: false
                  description: Custom window end (overrides timeframe when provided).
                  schema:
                      type: string
                      format: date-time
                - name: include
                  in: query
                  required: false
                  description: Optional expansions for UI.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/MyStatsInclude"
