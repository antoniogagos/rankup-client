      parent: game
      kind: nav
    - name: me.tournamentInvites
      summary: Tournament invites
      description: View and respond to direct tournament invitations (recipient-side).
      parent: me
      kind: nav
    - name: tournaments.invitationCodes
      summary: Invitation codes
      description: Join tournaments using invitation codes (no spectator access).
      parent: tournaments
      kind: nav
    - name: live
      summary: Live
      description: Notifications and in-app feed for real-time, retention-driven experiences.
      kind: nav
    - name: live.notifications
