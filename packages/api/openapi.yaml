                      withRewards:
                          value:
                              - rewards
                              - mechanics
                - name: sort
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/PromotionSort"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
