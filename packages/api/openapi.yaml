openapi: 3.1.2
info:
    title: Rankup API
    version: 0.1.0
    summary: Tournament-based social sports gaming platform (no betting).
    description: >
        Rankup is a tournament-centric social gaming platform built around
        real-world sports events.

        This OpenAPI document is **design-first** and intended to evolve safely over time.
servers:
    - name: prod
      url: https://api.rankup.example.com/v1
      description: Production
    - name: staging
      url: https://staging-api.rankup.example.com/v1
      description: Staging
tags:
    - name: meta
      summary: Meta
      description: Health checks and app configuration.
      kind: nav
    - name: meta.health
      summary: Health
      description: Liveness/readiness probes for load balancers and orchestration.
      parent: meta
      kind: nav
    - name: meta.config
      summary: Config
      description: App configuration and bootstrap payloads.
      parent: meta
      kind: nav
    - name: achievements
      summary: Achievements
      description: Verified achievements, titles, badges and other meaningful
          progression artifacts.
      kind: nav
    - name: achievements.meta
      summary: Meta
      description: Achievement definitions and catalogs.
      parent: achievements
      kind: nav
    - name: achievements.me
      summary: My achievements
      description: My achievement progress and unlock history.
      parent: achievements
      kind: nav
    - name: achievements.users
      summary: User achievements
      description: Public/permissioned achievement profile (privacy-aware).
      parent: achievements
      kind: nav
    - name: admin
      summary: Admin / Backoffice
      description: Staff-only backoffice APIs (highly privileged).
      kind: nav
      x-rankup-internal: true
    - name: admin.meta
      summary: Meta
      description: Admin meta and staff identity.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.audit
      summary: Audit
      description: Immutable audit log for privileged actions.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.users
      summary: Users
      description: User lookup, flags, and enforcement actions.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.trustSafety
      summary: Trust & Safety
      description: Reports, appeals, and moderation queues.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.media
      summary: Media moderation
      description: Media review/approval and takedowns.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.tournaments
      summary: Tournaments
      description: Tournament inspection, lifecycle overrides, recomputation.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.verified
      summary: Verified hub
      description: Manage verified events/tournaments and hub curation.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.creators
      summary: Creators
      description: Manage creator profiles, collections, and featuring.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.promotions
      summary: Promotions & rewards
      description: Manage official promotions, winners, and reward grants (no betting).
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.ranked
      summary: Ranked
      description: Manage ranked tracks/seasons and recomputation.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.achievements
      summary: Achievements
      description: Manage achievement definitions and grants.
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: admin.sports
      summary: Sports operations
      description: Overrides and recomputation for sports data (staff-only).
      parent: admin
      kind: nav
      x-rankup-internal: true
    - name: auth
      summary: Authentication & sessions
      description: Registration, login sessions, OAuth, and password resets.
      kind: nav
    - name: auth.registrations
      summary: Registrations
      description: Email/password sign-up and email confirmation.
      parent: auth
      kind: nav
    - name: auth.sessions
      summary: Sessions
      description: Login, refresh, and logout.
      parent: auth
      kind: nav
    - name: auth.passwordResets
      summary: Password resets
      description: Request and confirm password resets.
      parent: auth
      kind: nav
    - name: auth.oauth
      summary: OAuth
      description: OAuth authorization, token exchange, and provider linking.
      parent: auth
      kind: nav
    - name: tournaments.chat
      summary: Chat
      description: Tournament group chat (member-only; no spectators).
      parent: tournaments
      kind: nav
    - name: tournaments.chatModeration
      summary: Chat moderation
      description: Role-based chat moderation (mute, delete, pin, settings).
      parent: tournaments
      kind: nav
    - name: creators
      summary: Creadores
      description:
          Creator discovery and catalog (influencers/brands/media) powering
