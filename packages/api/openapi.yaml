                  additionalProperties: true
                  required:
                      - lockState
                  properties:
                      lockState:
                          $ref: "#/components/schemas/MatchLockState"
                      lockAt:
                          type: string
                          format: date-time
                          description: >
                              Server-authoritative lock time for submissions related to this
                              match.

                              In matchday-locking game modes, this may equal the matchday lock time.
                      lockReason:
                          type: string
                          description:
                              Optional explanatory reason (server-defined, stable ids
                              recommended).
                          examples:
                              - kickoff
                              - kickoffWithGrace
                              - manual
        TournamentMatchPage:
            type: object
            additionalProperties: false
            required:
                - serverTime
                - items
            properties:
                serverTime:
                    type: string
                    format: date-time
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/TournamentMatch"
                nextCursor:
                    type: string
        TrustPolicyId:
            type: string
            example: pol_community_guidelines
        TrustPolicyInclude:
            type: string
            enum:
                - content
            description: Include full content in list (default false).
        TrustPolicy:
            type: object
            additionalProperties: false
            required:
                - policyId
                - title
                - version
                - updatedAt
                - url
            properties:
                policyId:
                    $ref: "#/components/schemas/TrustPolicyId"
                title:
                    type: string
                    description: Localized title.
                version:
                    type: string
                    description: Policy version string.
                    example: 2026-02-01
                updatedAt:
                    type: string
                    format: date-time
                url:
                    type: string
                    format: uri
                    description: Canonical URL to the policy (for legal pages).
                content:
                    type: string
                    description: Localized full policy content (only if include=content).
                summary:
                    type: string
                    description: Localized short summary.
        TrustPolicyList:
            type: object
            additionalProperties: false
            required:
                - items
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/TrustPolicy"
        EnforcementActionType:
