    "/tournaments/{tournamentId}/chat/messages":
        get:
            tags:
                - tournaments.chat
            operationId: listTournamentChatMessages
            summary: List chat messages (member-only)
            description: >
                Lists chat messages for the tournament.


                Pagination model:

                - If `cursor` is omitted, server returns the most recent messages (latest page).

                - `direction=backward` fetches older messages relative to cursor.

                - `direction=forward` fetches newer messages relative to cursor (useful for incremental polling).


                No spectators:

                - Membership required.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
                - name: direction
                  in: query
                  required: false
                  description: Pagination direction relative to `cursor`.
                  schema:
                      $ref: "#/components/schemas/ChatPageDirection"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/PageSize"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Chat message page.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ChatMessagePage"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
        post:
            tags:
                - tournaments.chat
            operationId: sendTournamentChatMessage
            summary: Send a chat message
            description: >
                Sends a message to the tournament chat.


                Server behavior (recommended):

                - Enforce `slowModeSeconds` (rate limit per user).

                - Enforce `maxMessageLength`.

                - Optionally apply profanity/unsafe content filters (422 on rejection).

                - If the user is muted, return 409.

                - If chat is disabled, return 409.


                Idempotency:

                - Clients SHOULD pass `X-Idempotency-Key` to prevent duplicates on retries.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
