                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
        patch:
            tags:
                - users.me
            operationId: updateMe
            summary: Update current user profile
            description: |
                Updates mutable profile fields (e.g., username, picture).

                Concurrency:
                - Clients MUST send `If-Match` with the ETag from the last `GET /me`.
                - Server returns 412 if the ETag does not match.
            security:
