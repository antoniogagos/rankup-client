                "201":
                    description: Message created.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Location:
                            description: Canonical URL of the created message.
                            schema:
                                type: string
                                format: uri-reference
                            example: /tournaments/tourn_01J8VZQ7QJ1Y6T4R3E2W1A0B9C/chat/messages/msg_01J8W0K7E2ZQZ6P0M4NQW2Y7AA
                        Cache-Control:
