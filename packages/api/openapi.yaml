    /uploads:
        post:
            tags:
                - uploads.uploads
            operationId: createUpload
            summary: Create an upload session
            description: >
                Creates an upload session and returns a direct-to-storage upload
                destination (pre-signed URL).


                Flow:

                1) POST /uploads -> get pre-signed destination

                2) Client uploads bytes directly to storage

                3) POST /uploads/{uploadId}/complete -> finalize -> returns Media asset (mediaId)


                Notes:

                - This endpoint is the gatekeeper for file type/size constraints and authorization for the intended purpose.

                - Server MUST enforce purpose + scope authorization (e.g., tournament cover requires tournament admin).
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateUploadRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "201":
                    description: Upload session created.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Location:
                            description: Canonical URL of the upload session.
                            schema:
                                type: string
                                format: uri-reference
                            example: /uploads/upl_01J8W0K7E2ZQZ6P0M4NQW2Y7JA
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UploadSession"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "409":
                    $ref: "#/components/responses/Conflict"
                "413":
                    $ref: "#/components/responses/PayloadTooLarge"
                "415":
                    $ref: "#/components/responses/UnsupportedMediaType"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    "/uploads/{uploadId}":
        get:
            tags:
                - uploads.uploads
            operationId: getUpload
            summary: Get upload session status
            description: |
                Returns upload session status for client polling/debug UX.

                Typical states:
                - created -> client has not uploaded yet
                - uploaded -> storage received bytes (may be inferred)
                - completing/processing -> server validating/scanning/transcoding
                - completed -> mediaId available
                - failed/expired
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/UploadId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Upload session.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UploadSession"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
        delete:
            tags:
                - uploads.uploads
            operationId: abortUpload
            summary: Abort an upload session
            description: >
                Aborts an upload session. Best-effort cleanup of storage object (if
                any).


                Idempotent:

                - Deleting an already-aborted or expired upload returns 204.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/UploadId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "204":
                    description: Upload aborted (or no-op).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
    "/uploads/{uploadId}/complete":
        post:
            tags:
                - uploads.uploads
            operationId: completeUpload
            summary: Complete an upload and create the media asset
            description: >
                Finalizes the upload, validates the stored object, and creates a Media
                asset.


                Notes:

                - Server MAY perform async processing (scan, resize, generate variants).

                - If processing is async, return 202 with UploadSession in processing state and a mediaId;
                  clients then poll GET /media/{mediaId} or GET /uploads/{uploadId}.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/UploadId"
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CompleteUploadRequest"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "201":
                    description:
                        Upload completed; media asset created and ready (or ready enough
                        for immediate use).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Location:
                            description: Canonical URL of the created media.
                            schema:
                                type: string
                                format: uri-reference
                            example: /media/med_01J8W0K7E2ZQZ6P0M4NQW2Y7JB
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Media"
                "202":
                    description: Upload accepted; media created but still processing.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Retry-After:
                            description: Suggested seconds to wait before polling again.
                            schema:
                                type: integer
                            example: 2
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/UploadSession"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "413":
                    $ref: "#/components/responses/PayloadTooLarge"
                "415":
                    $ref: "#/components/responses/UnsupportedMediaType"
                "422":
                    $ref: "#/components/responses/UnprocessableEntity"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
                "500":
                    $ref: "#/components/responses/InternalServerError"
                "503":
                    $ref: "#/components/responses/ServiceUnavailable"
    "/media/{mediaId}":
        get:
            tags:
                - uploads.media
            operationId: getMedia
            summary: Get media metadata and URLs
            description: >
                Returns media metadata and variant URLs.


                Security:

                - If media is public, it MAY be accessible without auth (server policy).

                - If private/unlisted, requires auth and authorization.


                URL strategy:

                - public assets may return stable CDN URLs (cacheable)

                - private assets return signed URLs (short TTL) -> response should be no-store
            security:
                - {}
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/MediaId"
                - name: include
                  in: query
                  required: false
                  description: Optional expansions (e.g., include original variant).
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/MediaInclude"
                  examples:
                      default:
                          value:
                              - variants
                      withOriginal:
                          value:
                              - variants
                              - original
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: Media asset.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            description: >
                                If signed URLs are included, server SHOULD set no-store.

                                If only stable public CDN URLs are included, server MAY set a short cache.
                            schema:
                                type: string
                            example: no-store
                        Vary:
                            $ref: "#/components/headers/Vary-Authorization-AcceptLanguage"
                        Content-Language:
                            $ref: "#/components/headers/Content-Language"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Media"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
        delete:
            tags:
                - uploads.media
            operationId: deleteMedia
            summary: Delete a media asset
            description: |
                Deletes a media asset (best-effort). Typically allowed only for:
                - the owner (user who uploaded it) and/or
                - tournament admin for tournament branding assets

                Server MUST prevent breaking references:
                - either soft-delete (keep for existing references), or
                - reject deletion if currently referenced, or
                - replace references with defaults (product policy).
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/MediaId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "204":
                    description: Deleted (or no-op if already deleted).
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
