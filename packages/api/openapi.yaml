    /creators:
        get:
            tags:
                - creators.directory
            operationId: listCreators
            summary: List creators
            description: >
                Lists creators for discovery.


                Design intent:

                - Discovery must be attractive, not "spam search".

                - Defaults should bias towards curated/featured creators.

                - Search is optional and should be rate-limited.


                Security:

                - Public endpoint (optional auth). With auth, the API MAY return viewer-specific hints
                  such as `isFollowedByMe` (if provided in include).
            security:
                - {}
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - name: q
                  in: query
                  required: false
                  description: Optional search (handle/display name). Server-controlled matching.
                  schema:
                      type: string
                      minLength: 2
                      maxLength: 64
                - name: featuredOnly
                  in: query
                  required: false
                  description:
                      If true, returns only featured creators (recommended default for
                      hub-like screens).
                  schema:
                      type: boolean
                      default: false
                - name: type
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/CreatorType"
                - name: sportId
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/SportId"
                - name: gameModeId
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/GameModeId"
                - name: locale
                  in: query
                  required: false
                  description:
                      Optional locale preference for creators that publish
                      locale-targeted content.
                  schema:
                      type: string
                      maxLength: 16
                  example: es-ES
                - name: include
                  in: query
                  required: false
                  description: Optional expansions for UI.
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/CreatorInclude"
                  examples:
