            tags:
                - tournaments.members
            operationId: joinTournament
            summary: Join a tournament (member resource)
            description: >
                Joins the tournament as the current user.


                Semantics:

                - For `joinMode=open`: no code required.

                - For `joinMode=code`: `invitationCode` is required OR the user must have a valid pending direct invite.

                - For `joinMode=closed`: only allowed if the user has a valid pending direct invite (or server policy allows admin-added membership in future).


