    "/tournaments/{tournamentId}/live":
        get:
            tags:
                - tournaments.live
            operationId: streamTournamentLive
            summary: Stream live tournament updates (SSE)
            description: >
                Server-Sent Events (SSE) stream with live updates for the tournament.


                Use cases:

                - "App feels alive": goals/events -> ranking deltas -> results changes

                - Live ranking UI without aggressive polling


                Event payloads:

                - Each SSE `data:` line is a JSON object matching `TournamentUpdateEvent`.

                - `event:` is the event type (e.g., `ranking.delta`, `match.event`).


                Client resume:

                - Clients SHOULD send `Last-Event-ID` header to resume after reconnects.
            security:
                - BearerAuth: []
            parameters:
                - $ref: "#/components/parameters/Accept-Language"
                - $ref: "#/components/parameters/TournamentId"
                - name: matchday
                  in: query
                  required: false
                  schema:
                      type: integer
                      minimum: 1
                - name: topics
                  in: query
                  required: false
                  style: form
                  explode: false
                  schema:
                      type: array
                      items:
                          $ref: "#/components/schemas/LiveTopic"
                  examples:
                      default:
                          value:
                              - ranking
                              - matchEvents
                - $ref: "#/components/parameters/LastEventId"
            responses:
                default:
                    $ref: "#/components/responses/DefaultProblem"
                "200":
                    description: SSE stream.
                    headers:
                        X-Request-Id:
                            $ref: "#/components/headers/X-Request-Id"
                        Cache-Control:
                            $ref: "#/components/headers/Cache-Control-NoStore"
                        Content-Type:
                            description: Always text/event-stream.
                            schema:
                                type: string
                            example: text/event-stream
                    content:
                        text/event-stream:
                            schema:
                                type: string
                            examples:
                                rankingDeltaExample:
                                    summary: Ranking delta SSE event
                                    value: >
                                        event: ranking.delta

                                        id: evt_01J8W0K7E2ZQZ6P0M4NQW2Y7AA

                                        data: {"type":"ranking.delta","tournamentId":"tourn_01J8VZQ7QJ1Y6T4R3E2W1A0B9C","scope":"matchday","matchday":23,"serverTime":"2026-02-01T19:35:12Z","deltas":[{"userId":"usr_01HR9D9Z3N7J2K1M8QW8X0Z4Y1","oldPosition":12,"newPosition":9,"pointsDelta":2,"totalPoints":34}]}


                                        event: match.event

                                        id: evt_01J8W0K7E2ZQZ6P0M4NQW2Y7AB

                                        data: {"type":"match.event","matchEvent":{"eventId":"evt_01J8VZQ7QJ1Y6T4R3E2W1A0B9C","matchId":"m_01J8VZQ7QJ1Y6T4R3E2W1A0B9C","type":"goal","occurredAt":"2026-02-01T19:35:10Z"}}
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "429":
                    $ref: "#/components/responses/TooManyRequests"
