<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Rankup</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="Description" content="" />
		<link rel="stylesheet" href="/node_modules/@rankup/samba/assets/styles/root.css" />
		<link rel="stylesheet" href="/node_modules/@rankup/samba/assets/styles/theme.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&family=Poppins:wght@400;700&display=swap"
			rel="stylesheet" />
	</head>

	<script type="module" src="/app-shell.ts"></script>
	<script>
		let theme = 'light';
		if (localStorage.getItem('theme')) {
			theme = localStorage.getItem('theme');
		} else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) {
			theme = 'dark';
		}
		theme = 'light'; // TODO dark theme
		document.documentElement.setAttribute('data-color-mode', theme);
	</script>

	<body>
		<app-shell id="rkApp" slot="authenticated"></app-shell>
		<sb-overlay-container></sb-overlay-container>
	</body>
</html>
