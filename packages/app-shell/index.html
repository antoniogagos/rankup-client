<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Rankup</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="Description" content="" />
		<link rel="stylesheet" href="/node_modules/@rankup/samba/assets/styles/root.css" />
		<link rel="stylesheet" href="/node_modules/@rankup/samba/assets/styles/theme.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	</head>

	<script type="module" src="/app-shell.ts"></script>

	<script type="module">
		import Routes from '/global-routes.ts';

		const { localStorage } = window;
		const ns = 'CognitoIdentityServiceProvider';
		const reg = new RegExp(ns + '\\.\\w+\\.LastAuthUser');
		const isLogged = Object.keys(localStorage).find(k => k.match(reg))?.length > 0;
		const preloadScript = document.createElement('script');
		preloadScript.setAttribute('type', 'module');
		if (!isLogged) {
			const home = Routes.find(route => route.path === '/');
			// TODO: search in env.json the componentPath of the route "/"
			preloadScript.setAttribute('src', home.componentPath);
		}
		document.documentElement.appendChild(preloadScript);
	</script>

	<script>
		let theme = 'light';
		if (localStorage.getItem('theme')) {
			theme = localStorage.getItem('theme');
		} else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) {
			theme = 'dark';
		}
		theme = 'light'; // TODO dark theme
		document.documentElement.setAttribute('data-color-mode', theme);
	</script>

	<body>
		<app-shell id="appShell" slot="authenticated"> </app-shell>
	</body>
</html>
