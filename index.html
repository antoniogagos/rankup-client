<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="Description" content="Put your description here." />
    <base href="/" />
    <title>rk-app</title>
    <link rel="stylesheet" href="./samba/styles/root.css" />
    <link rel="stylesheet" href="./samba/styles/theme.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet" />
  </head>

  <body>
    <rk-auth-wall>
      <rk-app id="rkApp" slot="authenticated"></rk-app>
      <rk-unauthenticated-app id="rkPublicApp" slot="unauthenticated"></rk-unauthenticated-app>
    </rk-auth-wall>
    <overlay-container></overlay-container>

    <script type="module" src="./out-tsc/src/elements/rk-auth-wall/rk-auth-wall.js"></script>
    <script>
      let authAppImported = false;
      let unauthAppImported = false;

      document.body.querySelector('rk-auth-wall').addEventListener('session-updated', evt => {
        const isLogged = evt.detail.session;
        if (isLogged) {
          setColorScheme();
          if (!authAppImported) {
            import('./out-tsc/src/rk-app.js');
            authAppImported = true;
          }
        } else {
          removeColorScheme();
          if (!unauthAppImported) {
            import('./out-tsc/src/rk-unauthenticated-app.js');
            unauthAppImported = true;
          }
        }
      });

      function setColorScheme() {
        let theme = 'light';
        if (localStorage.getItem('theme')) {
          theme = localStorage.getItem('theme');
        } else if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
        }
        if (theme === 'dark') {
          // document.documentElement.setAttribute('data-color-mode', 'dark');
        } else {
          removeColorScheme();
        }
      }

      function removeColorScheme() {
        document.documentElement.removeAttribute('data-color-mode');
      }
    </script>
  </body>
</html>
