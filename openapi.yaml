openapi: 3.0.3
info:
  title: RankUp API
  version: 0.1.0
  description: API contract consumed by the RankUp client.
servers:
  - url: '{apiBaseUrl}'
    variables:
      apiBaseUrl:
        default: https://api.example.com
        description: Base API URL (matches ApiURL from the runtime environment).
paths:
  /user/{userId}:
    get:
      summary: Get user profile
      operationId: getUser
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique user identifier.
          schema:
            type: string
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '404':
          description: User not found
      security:
        - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
        username:
          type: string
        picture:
          type: string
          nullable: true
